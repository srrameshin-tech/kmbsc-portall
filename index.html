<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KMBSC Admin Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f1117;color:#e2e8f0;font-family:'Sora',sans-serif;}
.mono{font-family:'JetBrains Mono',monospace;}
input,select,textarea{background:#12151f;border:1px solid #2a2d3e;color:#e2e8f0;border-radius:8px;padding:10px 14px;font-family:'Sora',sans-serif;font-size:14px;width:100%;outline:none;transition:border .2s;}
input:focus,select:focus,textarea:focus{border-color:#f5c842;}
button{cursor:pointer;font-family:'Sora',sans-serif;border:none;border-radius:8px;transition:all .15s;}
textarea{resize:vertical;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:#1a1d27;}
::-webkit-scrollbar-thumb{background:#2a2d3e;border-radius:3px;}
.fade-in{animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.spin{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// ── Firebase Init ─────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBVGVu59jDZybPFAX_pRisSrQRoXHQ0EWY",
  authDomain: "kmbsc-chit.firebaseapp.com",
  databaseURL: "https://kmbsc-chit-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kmbsc-chit",
  storageBucket: "kmbsc-chit.firebasestorage.app",
  messagingSenderId: "511325458985",
  appId: "1:511325458985:web:7539c92a18c77daa05c238",
  measurementId: "G-R2SLR128Y3"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── Colors ────────────────────────────────────────────────────
const C = {
  bg:"#0f1117", card:"#1a1d27", border:"#2a2d3e",
  gold:"#f5c842", green:"#22c55e", red:"#ef4444",
  blue:"#60a5fa", text:"#e2e8f0", muted:"#64748b"
};

// ── Helpers ───────────────────────────────────────────────────
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const curMonth = () => { const d=new Date(); return `${MONTHS[d.getMonth()]} ${d.getFullYear()}`; };
const fmt = n => "₹" + Number(n||0).toLocaleString("en-IN");
const today = () => new Date().toISOString().slice(0,10);

// ── State ─────────────────────────────────────────────────────
let state = {
  user: null, loading: true, authLoading: false,
  tab: "dashboard", members: [], payments: [],
  toast: null, toastTimer: null,
  showMemberForm: false, editMember: null,
  showPayForm: false, memberDetail: null,
  filterMonth: curMonth(),
  memberForm: {name:"",phone:"",chitAmount:"",joinDate:"",status:"Active",notes:""},
  payForm: {memberId:"",month:curMonth(),amount:"",date:today(),status:"Paid",notes:""},
  loginEmail:"", loginPassword:"", loginError:""
};

function setState(patch) {
  state = {...state, ...patch};
  render();
}

// ── Toast ─────────────────────────────────────────────────────
function showToast(msg, type="success") {
  if(state.toastTimer) clearTimeout(state.toastTimer);
  const timer = setTimeout(()=>setState({toast:null,toastTimer:null}), 2500);
  setState({toast:{msg,type}, toastTimer:timer});
}

// ── Firebase DB ───────────────────────────────────────────────
async function loadAll() {
  try {
    const [mSnap, pSnap] = await Promise.all([
      getDocs(query(collection(db,"members"), orderBy("name"))),
      getDocs(query(collection(db,"payments"), orderBy("date","desc")))
    ]);
    const members = mSnap.docs.map(d=>({id:d.id,...d.data()}));
    const payments = pSnap.docs.map(d=>({id:d.id,...d.data()}));
    setState({members, payments, loading:false});
  } catch(e) {
    setState({loading:false});
    showToast("Data load failed","error");
  }
}

async function addMember(data) {
  const ref = await addDoc(collection(db,"members"), data);
  setState({members:[...state.members,{id:ref.id,...data}]});
}
async function updateMember(id, data) {
  await updateDoc(doc(db,"members",id), data);
  setState({members:state.members.map(m=>m.id===id?{...m,...data}:m)});
}
async function deleteMember(id) {
  await deleteDoc(doc(db,"members",id));
  setState({members:state.members.filter(m=>m.id!==id)});
}
async function addPayment(data) {
  const ref = await addDoc(collection(db,"payments"), data);
  setState({payments:[{id:ref.id,...data},...state.payments]});
}
async function deletePayment(id) {
  await deleteDoc(doc(db,"payments",id));
  setState({payments:state.payments.filter(p=>p.id!==id)});
}

// ── Auth ──────────────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  setState({user, loading: false});
  if(user) loadAll();
});

async function login() {
  setState({authLoading:true, loginError:""});
  try {
    await signInWithEmailAndPassword(auth, state.loginEmail, state.loginPassword);
  } catch(e) {
    setState({authLoading:false, loginError:"தவறான Email / Password"});
  }
}
async function logout() {
  await signOut(auth);
  setState({user:null, members:[], payments:[]});
}

// ── Render helpers ────────────────────────────────────────────
function el(tag, props={}, ...children) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==="style" && typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className") e.className=v;
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c==null||c===false) return;
    e.appendChild(typeof c==="string"||typeof c==="number" ? document.createTextNode(c) : c);
  });
  return e;
}

function badge(status) {
  const map={Paid:{bg:"#14532d",color:"#4ade80"},Pending:{bg:"#7c2d12",color:"#fb923c"},Active:{bg:"#1e3a5f",color:"#60a5fa"},Inactive:{bg:"#3b0764",color:"#a78bfa"}};
  const s=map[status]||{bg:"#1e293b",color:"#94a3b8"};
  return el("span",{style:{background:s.bg,color:s.color,borderRadius:20,padding:"2px 10px",fontSize:12,fontWeight:600}},status);
}

function btn(label, onClick, style={}) {
  return el("button",{onClick, style:{padding:"10px 18px",fontWeight:700,fontSize:13,...style}},label);
}

function input(placeholder, value, onInput, type="text", extraStyle={}) {
  const i = el("input",{placeholder,type,value:value||"",style:{marginBottom:0,...extraStyle}});
  i.addEventListener("input", e=>onInput(e.target.value));
  return i;
}

function select(options, value, onChange) {
  const s = el("select");
  options.forEach(([v,l])=>{
    const o = el("option",{value:v},l||v);
    if(v===value) o.selected=true;
    s.appendChild(o);
  });
  s.addEventListener("change",e=>onChange(e.target.value));
  return s;
}

function modal(title, content, onClose) {
  const overlay = el("div",{onClick:onClose, style:{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}});
  const box = el("div",{onClick:e=>e.stopPropagation(), style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:24,width:"100%",maxWidth:420,maxHeight:"90vh",overflowY:"auto"}});
  const header = el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}},
    el("h3",{style:{fontSize:17,fontWeight:700}},title),
    btn("✕",onClose,{background:"none",color:C.muted,fontSize:22,padding:"4px 8px"})
  );
  box.appendChild(header);
  box.appendChild(content);
  overlay.appendChild(box);
  return overlay;
}

function formGroup(...fields) {
  const d = el("div",{style:{display:"flex",flexDirection:"column",gap:11}});
  fields.forEach(f=>f&&d.appendChild(f));
  return d;
}

// ── Login Screen ──────────────────────────────────────────────
function renderLogin() {
  return el("div",{style:{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:16}},
    el("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:32,width:"100%",maxWidth:360}},
      el("div",{style:{textAlign:"center",marginBottom:28}},
        el("div",{style:{width:56,height:56,background:C.gold,borderRadius:14,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:26,marginBottom:12}},"🏛️"),
        el("h1",{style:{fontSize:22,fontWeight:700,color:C.gold}},"KMBSC"),
        el("p",{style:{fontSize:12,color:C.muted,marginTop:4}},"Kovil Mutual Benefit Savings Chit")
      ),
      el("div",{style:{display:"flex",flexDirection:"column",gap:12}},
        (() => {
          const i = el("input",{type:"email",placeholder:"Email Address",value:state.loginEmail});
          i.addEventListener("input",e=>setState({loginEmail:e.target.value}));
          return i;
        })(),
        (() => {
          const i = el("input",{type:"password",placeholder:"Password",value:state.loginPassword});
          i.addEventListener("input",e=>setState({loginPassword:e.target.value}));
          i.addEventListener("keydown",e=>{ if(e.key==="Enter") login(); });
          return i;
        })(),
        state.loginError ? el("div",{style:{color:C.red,fontSize:13,textAlign:"center"}},state.loginError) : null,
        el("button",{onClick:login, style:{background:C.gold,color:"#000",fontWeight:700,padding:"13px",fontSize:15,borderRadius:8,opacity:state.authLoading?.6:1}},
          state.authLoading ? "Logging in..." : "🔐 Login"
        )
      )
    )
  );
}

// ── Dashboard ─────────────────────────────────────────────────
function renderDashboard() {
  const {members,payments} = state;
  const thisMonth = curMonth();
  const totalChit = members.reduce((s,m)=>s+Number(m.chitAmount||0),0);
  const paidNow = payments.filter(p=>p.month===thisMonth&&p.status==="Paid").length;
  const totalCollected = payments.filter(p=>p.status==="Paid").reduce((s,p)=>s+Number(p.amount||0),0);
  const pct = members.length>0 ? Math.round(paidNow/members.length*100) : 0;
  const recent = payments.slice(0,5);

  function statCard(icon,label,value,color) {
    return el("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"16px 18px",flex:1,minWidth:130}},
      el("div",{style:{fontSize:20,marginBottom:5}},icon),
      el("div",{style:{fontSize:22,fontWeight:700,color,fontFamily:"'JetBrains Mono',monospace"}},value),
      el("div",{style:{fontSize:11,color:C.muted,marginTop:3}},label)
    );
  }

  return el("div",{className:"fade-in"},
    el("h2",{style:{fontSize:20,fontWeight:700,marginBottom:16}},"Dashboard"),
    el("div",{style:{display:"flex",gap:10,flexWrap:"wrap",marginBottom:18}},
      statCard("👥","Total Members",members.length,C.blue),
      statCard("💰","Total Chit",fmt(totalChit),C.gold),
      statCard("✅",`Paid (${thisMonth})`,paidNow,C.green),
      statCard("⏳","Pending",members.length-paidNow,"#fb923c"),
      statCard("🏦","Total Collected",fmt(totalCollected),C.gold)
    ),
    el("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:14}},
      el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:8}},
        el("span",{style:{fontWeight:600,fontSize:13}},`${thisMonth} Collection`),
        el("span",{className:"mono",style:{color:C.gold,fontWeight:700}},`${pct}%`)
      ),
      el("div",{style:{background:"#1e293b",borderRadius:99,height:10}},
        el("div",{style:{background:`linear-gradient(90deg,${C.gold},#f97316)`,borderRadius:99,height:10,width:`${pct}%`,transition:"width .5s"}})
      ),
      el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:11,color:C.muted,marginTop:5}},
        el("span",{},`${paidNow} paid`),
        el("span",{},`${members.length-paidNow} pending`)
      )
    ),
    el("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16}},
      el("h3",{style:{fontSize:14,fontWeight:700,marginBottom:12}},"Recent Payments"),
      recent.length===0
        ? el("div",{style:{color:C.muted,textAlign:"center",padding:20,fontSize:13}},"No payments yet")
        : el("div",{},
          ...recent.map(p=>el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.border}`}},
            el("div",{},
              el("div",{style:{fontWeight:600,fontSize:13}},p.memberName),
              el("div",{style:{fontSize:11,color:C.muted}},`${p.month} · ${p.date}`)
            ),
            el("div",{style:{textAlign:"right"}},
              el("div",{className:"mono",style:{color:C.green,fontWeight:700,fontSize:13}},fmt(p.amount)),
              badge(p.status)
            )
          ))
        )
    )
  );
}

// ── Members ───────────────────────────────────────────────────
function renderMembers() {
  const {members,payments,showMemberForm,editMember,memberForm,memberDetail} = state;
  const [search,setSearch] = [state.memberSearch||"", v=>setState({memberSearch:v})];
  const filtered = members.filter(m=>m.name.toLowerCase().includes(search.toLowerCase())||m.phone.includes(search));

  const openAdd = ()=>setState({showMemberForm:true,editMember:null,memberForm:{name:"",phone:"",chitAmount:"",joinDate:"",status:"Active",notes:""}});
  const openEdit = (m,e)=>{ e.stopPropagation(); setState({showMemberForm:true,editMember:m,memberForm:{...m}}); };

  const saveMember = async()=>{
    if(!memberForm.name.trim()||!memberForm.phone.trim()) return alert("Name & Phone required!");
    try {
      if(editMember) {
        await updateMember(editMember.id, memberForm);
        showToast("Member updated!");
      } else {
        await addMember(memberForm);
        showToast("Member added!");
      }
      setState({showMemberForm:false});
    } catch { showToast("Error saving","error"); }
  };

  const delMember = async(id,e)=>{
    e.stopPropagation();
    if(!confirm("Delete this member?")) return;
    try { await deleteMember(id); showToast("Deleted","error"); } catch { showToast("Error","error"); }
  };

  const mPay = id => payments.filter(p=>p.memberId===id);

  const memberCard = m => {
    const paid = mPay(m.id).filter(p=>p.status==="Paid").length;
    return el("div",{onClick:()=>setState({memberDetail:m}), style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,cursor:"pointer"}},
      el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}},
        el("div",{},
          el("div",{style:{fontWeight:700,fontSize:15}},m.name),
          el("div",{className:"mono",style:{fontSize:11,color:C.muted}},m.phone)
        ),
        badge(m.status)
      ),
      el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}},
        el("span",{style:{color:C.muted}},"Chit Amount"),
        el("span",{className:"mono",style:{color:C.gold,fontWeight:700}},fmt(m.chitAmount))
      ),
      el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:12}},
        el("span",{style:{color:C.muted}},"Payments Made"),
        el("span",{className:"mono",style:{color:C.green}},paid)
      ),
      el("div",{onClick:e=>e.stopPropagation(),style:{display:"flex",gap:8}},
        btn("✏️ Edit",e=>openEdit(m,e),{flex:1,background:"#1e293b",color:C.blue,padding:"7px 0",fontSize:12}),
        btn("🗑️ Delete",e=>delMember(m.id,e),{flex:1,background:"#1e293b",color:C.red,padding:"7px 0",fontSize:12})
      )
    );
  };

  const wrap = el("div",{className:"fade-in"});
  const topBar = el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
    el("h2",{style:{fontSize:20,fontWeight:700}},`Members (${members.length})`),
    btn("+ Add Member",openAdd,{background:C.gold,color:"#000"})
  );
  const searchBox = el("input",{placeholder:"🔍 Search name or phone...",value:search,style:{marginBottom:14}});
  searchBox.addEventListener("input",e=>setSearch(e.target.value));

  const grid = el("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:12}});
  filtered.forEach(m=>grid.appendChild(memberCard(m)));
  if(filtered.length===0) grid.appendChild(el("div",{style:{color:C.muted,textAlign:"center",padding:40,fontSize:13,gridColumn:"1/-1"}},"No members found"));

  wrap.appendChild(topBar);
  wrap.appendChild(searchBox);
  wrap.appendChild(grid);

  // Member Form Modal
  if(showMemberForm) {
    const f = memberForm;
    const nameI = el("input",{placeholder:"Full Name *",value:f.name||""}); nameI.addEventListener("input",e=>setState({memberForm:{...state.memberForm,name:e.target.value}}));
    const phoneI = el("input",{placeholder:"Phone Number *",value:f.phone||""}); phoneI.addEventListener("input",e=>setState({memberForm:{...state.memberForm,phone:e.target.value}}));
    const amtI = el("input",{type:"number",placeholder:"Chit Amount (₹)",value:f.chitAmount||""}); amtI.addEventListener("input",e=>setState({memberForm:{...state.memberForm,chitAmount:e.target.value}}));
    const dateI = el("input",{type:"date",value:f.joinDate||""}); dateI.addEventListener("input",e=>setState({memberForm:{...state.memberForm,joinDate:e.target.value}}));
    const statSel = select([["Active","Active"],["Inactive","Inactive"]], f.status, v=>setState({memberForm:{...state.memberForm,status:v}}));
    const notesI = el("textarea",{placeholder:"Notes (optional)",rows:2}); notesI.value=f.notes||""; notesI.addEventListener("input",e=>setState({memberForm:{...state.memberForm,notes:e.target.value}}));
    const saveBtn = btn(editMember?"Update Member":"Add Member",saveMember,{background:C.gold,color:"#000",padding:12,fontSize:14,width:"100%"});
    const content = formGroup(nameI,phoneI,amtI,dateI,statSel,notesI,saveBtn);
    wrap.appendChild(modal(editMember?"Edit Member":"Add Member",content,()=>setState({showMemberForm:false})));
  }

  // Member Detail Modal
  if(memberDetail) {
    const mp = mPay(memberDetail.id);
    const rows = [["📞 Phone",memberDetail.phone],["💰 Chit",fmt(memberDetail.chitAmount)],["📅 Join Date",memberDetail.joinDate||"-"],["📝 Notes",memberDetail.notes||"-"]];
    const content = el("div",{},
      ...rows.map(([k,v])=>el("div",{style:{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:`1px solid ${C.border}`}},
        el("span",{style:{color:C.muted,fontSize:13}},k),
        el("span",{style:{fontWeight:600,fontSize:13}},v)
      )),
      el("h4",{style:{marginTop:14,marginBottom:8,color:C.gold,fontSize:13}},"Payment History"),
      mp.length===0
        ? el("div",{style:{color:C.muted,textAlign:"center",padding:16,fontSize:13}},"No payments yet")
        : el("div",{},...mp.map(p=>el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,padding:"6px 0",borderBottom:`1px solid ${C.border}`}},
            el("span",{},p.month),
            el("span",{className:"mono",style:{color:C.green}},fmt(p.amount)),
            badge(p.status)
          )))
    );
    wrap.appendChild(modal(memberDetail.name,content,()=>setState({memberDetail:null})));
  }

  return wrap;
}

// ── Payments ──────────────────────────────────────────────────
function renderPayments() {
  const {members,payments,showPayForm,payForm,filterMonth} = state;
  const allMonths=[...new Set([curMonth(),...payments.map(p=>p.month)])];
  const filtered = payments.filter(p=>p.month===filterMonth);
  const paidIds = filtered.filter(p=>p.status==="Paid").map(p=>p.memberId);
  const pendingMembers = members.filter(m=>!paidIds.includes(m.id));
  const getM = id => members.find(m=>m.id===id);

  const addPay = async()=>{
    if(!payForm.memberId) return alert("Select a member!");
    const m = getM(payForm.memberId);
    const data = {...payForm, memberName:m?.name||"-", amount:payForm.amount||m?.chitAmount||0};
    try { await addPayment(data); showToast("Payment recorded!"); setState({showPayForm:false,payForm:{memberId:"",month:curMonth(),amount:"",date:today(),status:"Paid",notes:""}}); }
    catch { showToast("Error","error"); }
  };

  const delPay = async(id)=>{
    try { await deletePayment(id); showToast("Deleted","error"); } catch { showToast("Error","error"); }
  };

  const wrap = el("div",{className:"fade-in"});
  wrap.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
    el("h2",{style:{fontSize:20,fontWeight:700}},"Payments"),
    btn("+ Record Payment",()=>setState({showPayForm:true}),{background:C.gold,color:"#000"})
  ));

  // Month tabs
  const tabs = el("div",{style:{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}});
  allMonths.forEach(m=>{
    const active = m===filterMonth;
    tabs.appendChild(btn(m,()=>setState({filterMonth:m}),{background:active?C.gold:C.card,color:active?"#000":C.muted,border:`1px solid ${active?C.gold:C.border}`,fontWeight:active?700:400,fontSize:12,padding:"6px 14px"}));
  });
  wrap.appendChild(tabs);

  // Pending
  if(pendingMembers.length>0) {
    const pend = el("div",{style:{background:"#1c1208",border:"1px solid #92400e",borderRadius:12,padding:12,marginBottom:12}},
      el("div",{style:{fontWeight:700,color:"#fb923c",fontSize:13,marginBottom:6}},`⏳ Pending (${pendingMembers.length})`),
      el("div",{style:{display:"flex",flexWrap:"wrap",gap:6}},...pendingMembers.map(m=>el("span",{style:{background:"#292117",color:"#fbbf24",padding:"3px 10px",borderRadius:20,fontSize:12}},m.name)))
    );
    wrap.appendChild(pend);
  }

  // Table
  const table = el("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden"}});
  table.appendChild(el("div",{style:{display:"grid",gridTemplateColumns:"1fr 90px 90px 80px 44px",padding:"10px 14px",borderBottom:`1px solid ${C.border}`,fontSize:11,color:C.muted,fontWeight:700}},
    el("span",{},"MEMBER"),el("span",{},"AMOUNT"),el("span",{},"DATE"),el("span",{},"STATUS"),el("span",{})
  ));
  if(filtered.length===0) {
    table.appendChild(el("div",{style:{textAlign:"center",padding:36,color:C.muted,fontSize:13}},`No payments for ${filterMonth}`));
  } else {
    filtered.forEach(p=>{
      const row = el("div",{style:{display:"grid",gridTemplateColumns:"1fr 90px 90px 80px 44px",padding:"12px 14px",borderBottom:`1px solid ${C.border}`,alignItems:"center"}},
        el("div",{},el("div",{style:{fontWeight:600,fontSize:13}},p.memberName), p.notes?el("div",{style:{fontSize:10,color:C.muted}},p.notes):null),
        el("span",{className:"mono",style:{color:C.green,fontWeight:700,fontSize:13}},fmt(p.amount)),
        el("span",{style:{fontSize:11,color:C.muted}},p.date),
        badge(p.status),
        btn("🗑️",()=>delPay(p.id),{background:"none",color:C.red,fontSize:16,padding:"4px"})
      );
      table.appendChild(row);
    });
  }
  wrap.appendChild(table);

  // Pay Form Modal
  if(showPayForm) {
    const f = payForm;
    const memSel = el("select");
    el("option",{value:""}, "Select Member *").selected=!f.memberId; memSel.appendChild(el("option",{value:""},"Select Member *"));
    members.forEach(m=>{ const o=el("option",{value:m.id},m.name); if(m.id===f.memberId)o.selected=true; memSel.appendChild(o); });
    memSel.addEventListener("change",e=>{ const m=getM(e.target.value); setState({payForm:{...state.payForm,memberId:e.target.value,amount:m?.chitAmount||""}}); });

    const monthI=el("input",{placeholder:"Month (e.g. Apr 2026)",value:f.month||""}); monthI.addEventListener("input",e=>setState({payForm:{...state.payForm,month:e.target.value}}));
    const amtI=el("input",{type:"number",placeholder:"Amount (₹)",value:f.amount||""}); amtI.addEventListener("input",e=>setState({payForm:{...state.payForm,amount:e.target.value}}));
    const dateI=el("input",{type:"date",value:f.date||""}); dateI.addEventListener("input",e=>setState({payForm:{...state.payForm,date:e.target.value}}));
    const statSel=select([["Paid","Paid"],["Pending","Pending"]],f.status,v=>setState({payForm:{...state.payForm,status:v}}));
    const notesI=el("textarea",{placeholder:"Notes (optional)",rows:2}); notesI.value=f.notes||""; notesI.addEventListener("input",e=>setState({payForm:{...state.payForm,notes:e.target.value}}));
    const saveBtn=btn("Record Payment",addPay,{background:C.gold,color:"#000",padding:12,fontSize:14,width:"100%"});
    wrap.appendChild(modal("Record Payment",formGroup(memSel,monthI,amtI,dateI,statSel,notesI,saveBtn),()=>setState({showPayForm:false})));
  }

  return wrap;
}

// ── Main Render ───────────────────────────────────────────────
function render() {
  const root = document.getElementById("root");
  root.innerHTML="";

  if(state.loading) {
    root.appendChild(el("div",{style:{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}},
      el("div",{style:{width:40,height:40,border:`4px solid ${C.border}`,borderTop:`4px solid ${C.gold}`,borderRadius:"50%"},className:"spin"}),
      el("div",{style:{color:C.muted,fontSize:14}},"Loading...")
    ));
    return;
  }

  if(!state.user) { root.appendChild(renderLogin()); return; }

  const wrapper = el("div",{style:{minHeight:"100vh",background:C.bg}});

  // Toast
  if(state.toast) {
    wrapper.appendChild(el("div",{style:{position:"fixed",top:16,right:16,zIndex:9999,background:state.toast.type==="success"?"#14532d":"#7f1d1d",color:"#fff",padding:"11px 18px",borderRadius:10,fontSize:13,fontWeight:600,boxShadow:"0 4px 20px rgba(0,0,0,.5)"}},
      (state.toast.type==="success"?"✅ ":"❌ ")+state.toast.msg
    ));
  }

  // Header
  wrapper.appendChild(el("div",{style:{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:56}},
    el("div",{style:{display:"flex",alignItems:"center",gap:10}},
      el("div",{style:{width:32,height:32,background:C.gold,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}},"🏛️"),
      el("div",{},
        el("div",{style:{fontWeight:700,fontSize:13,color:C.gold}},"KMBSC"),
        el("div",{style:{fontSize:10,color:C.muted}},"Kovil Mutual Benefit Savings Chit")
      )
    ),
    el("div",{style:{display:"flex",alignItems:"center",gap:10}},
      el("div",{className:"mono",style:{fontSize:11,color:C.muted}},curMonth()),
      btn("Logout",logout,{background:"#1e293b",color:C.red,fontSize:12,padding:"6px 12px"})
    )
  ));

  // Nav
  const nav = el("div",{style:{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"0 16px",display:"flex",gap:2,overflowX:"auto"}});
  [["dashboard","📊 Dashboard"],["members","👥 Members"],["payments","💳 Payments"]].forEach(([id,label])=>{
    const active=state.tab===id;
    nav.appendChild(btn(label,()=>setState({tab:id}),{padding:"12px 14px",background:"none",color:active?C.gold:C.muted,fontWeight:active?700:400,borderBottom:active?`2px solid ${C.gold}`:"2px solid transparent",borderRadius:0,fontSize:12,whiteSpace:"nowrap"}));
  });
  wrapper.appendChild(nav);

  // Content
  const content = el("div",{style:{padding:"18px 14px",maxWidth:1100,margin:"0 auto"}});
  if(state.tab==="dashboard") content.appendChild(renderDashboard());
  else if(state.tab==="members") content.appendChild(renderMembers());
  else if(state.tab==="payments") content.appendChild(renderPayments());
  wrapper.appendChild(content);

  root.appendChild(wrapper);
}

render();
</script>
</body>
</html>
