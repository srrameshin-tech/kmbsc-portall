<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KMBSC Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#0f1117;color:#fff;margin:0}
header{background:#1a1d27;padding:15px;text-align:center;font-weight:bold;color:#f5c842}
.container{padding:15px}
.card{background:#1a1d27;padding:15px;margin-bottom:10px;border-radius:10px}
button{padding:10px;border:none;border-radius:6px;background:#f5c842;color:#000;font-weight:bold}
input{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:none}
.item{background:#111;padding:10px;margin-bottom:5px;border-radius:6px}
</style>
</head>

<body>

<header>KMBSC Portal 🔥 (Live Firebase)</header>

<div class="container">

<div class="card">
<h3>Add Member</h3>
<input id="name" placeholder="Name">
<input id="amount" placeholder="Amount">
<button onclick="addMember()">Add</button>
</div>

<div class="card">
<h3>Members</h3>
<div id="members"></div>
</div>

<div class="card">
<h3>Add Payment</h3>
<input id="pname" placeholder="Member Name">
<input id="pamount" placeholder="Amount">
<button onclick="addPayment()">Add</button>
</div>

<div class="card">
<h3>Payments</h3>
<div id="payments"></div>
</div>

</div>

<!-- ✅ CORRECT Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

// ✅ FINAL CONFIG (CORRECTED)
const firebaseConfig = {
  apiKey: "AIzaSyBVGVu59jDZybPFAX_pRisSrQRoXHQ0EWY",
  authDomain: "kmbsc-chit.firebaseapp.com",
  databaseURL: "https://kmbsc-chit-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kmbsc-chit",
  storageBucket: "kmbsc-chit.appspot.com",
  messagingSenderId: "511325458985",
  appId: "1:511325458985:web:a7597bcf0f89b71405c238"
};

// INIT
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ➕ ADD MEMBER
function addMember(){
  let name = document.getElementById("name").value;
  let amount = document.getElementById("amount").value;

  if(!name) return alert("Enter name");

  db.ref("members").push({
    name:name,
    amount:Number(amount)
  });

  document.getElementById("name").value="";
  document.getElementById("amount").value="";
}

// ➕ ADD PAYMENT
function addPayment(){
  let name = document.getElementById("pname").value;
  let amount = document.getElementById("pamount").value;

  if(!name) return alert("Enter name");

  db.ref("payments").push({
    name:name,
    amount:Number(amount),
    date:new Date().toLocaleDateString()
  });

  document.getElementById("pname").value="";
  document.getElementById("pamount").value="";
}

// 🔄 LIVE MEMBERS
db.ref("members").on("value", snap=>{
  let html="";
  snap.forEach(child=>{
    let m = child.val();
    html += `<div class="item">${m.name} - ₹${m.amount}</div>`;
  });
  document.getElementById("members").innerHTML = html;
});

// 🔄 LIVE PAYMENTS
db.ref("payments").on("value", snap=>{
  let html="";
  snap.forEach(child=>{
    let p = child.val();
    html += `<div class="item">${p.name} - ₹${p.amount} (${p.date})</div>`;
  });
  document.getElementById("payments").innerHTML = html;
});

</script>

</body>
</html>
