<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>KMBSC Portal</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f1117;color:#e2e8f0;font-family:'Sora',sans-serif;-webkit-text-size-adjust:none;text-size-adjust:none;min-width:320px;overflow-x:hidden;}
input,select,textarea{background:#12151f;border:1px solid #2a2d3e;color:#e2e8f0;border-radius:10px;padding:13px 14px;font-size:16px;width:100%;outline:none;font-family:'Sora',sans-serif;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:#f5c842;}
button{cursor:pointer;font-family:'Sora',sans-serif;border:none;border-radius:10px;-webkit-tap-highlight-color:transparent;}
button:active{opacity:.75;}
textarea{resize:vertical;font-size:15px;}
.mono{font-family:'Courier New',monospace;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#2a2d3e;border-radius:3px;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBVGVu59jDZybPFAX_pRisSrQRoXHQ0EWY",
  authDomain: "kmbsc-chit.firebaseapp.com",
  projectId: "kmbsc-chit",
  storageBucket: "kmbsc-chit.firebasestorage.app",
  messagingSenderId: "511325458985",
  appId: "1:511325458985:web:7539c92a18c77daa05c238"
});

window.__fb = {
  auth: getAuth(app), db: getFirestore(app),
  signInWithEmailAndPassword, signOut, onAuthStateChanged,
  collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy
};
window.dispatchEvent(new Event('fbready'));
</script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const C = { bg:"#0f1117", card:"#1a1d27", border:"#2a2d3e", gold:"#f5c842", green:"#22c55e", red:"#ef4444", blue:"#60a5fa", muted:"#64748b" };
const MO = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const curM = () => { const d=new Date(); return `${MO[d.getMonth()]} ${d.getFullYear()}`; };
const fmt = n => "₹"+Number(n||0).toLocaleString("en-IN");
const toStr = () => new Date().toISOString().slice(0,10);

function Badge({s}) {
  const m={Paid:{bg:"#14532d",c:"#4ade80"},Pending:{bg:"#7c2d12",c:"#fb923c"},Active:{bg:"#1e3a5f",c:"#60a5fa"},Inactive:{bg:"#3b0764",c:"#a78bfa"}};
  const x=m[s]||{bg:"#1e293b",c:"#94a3b8"};
  return <span style={{background:x.bg,color:x.c,borderRadius:20,padding:"2px 10px",fontSize:12,fontWeight:600}}>{s}</span>;
}

function Modal({title,onClose,children}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:200,overflowY:"auto",padding:"12px"}} onClick={onClose}>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:20,width:"100%",maxWidth:420,margin:"0 auto",marginTop:10}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <b style={{fontSize:16}}>{title}</b>
          <button onClick={onClose} style={{background:"none",color:C.muted,fontSize:24,lineHeight:1,padding:"0 4px"}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── Login — uses refs, NO re-render on type ───────────────────
function Login() {
  const eRef = useRef(); const pRef = useRef();
  const [err,setErr] = useState(""); const [busy,setBusy] = useState(false);
  const go = async() => {
    const e=eRef.current.value.trim(), p=pRef.current.value;
    if(!e||!p){setErr("Email & Password தேவை!");return;}
    setBusy(true); setErr("");
    try{ await window.__fb.signInWithEmailAndPassword(window.__fb.auth,e,p); }
    catch{ setErr("தவறான Email / Password"); setBusy(false); }
  };
  return (
    <div style={{minHeight:"100vh",background:C.bg,padding:"50px 16px 20px"}}>
      <div style={{maxWidth:380,margin:"0 auto",background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:24}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{width:52,height:52,background:C.gold,borderRadius:14,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:24,marginBottom:8}}>🏛️</div>
          <div style={{fontWeight:700,fontSize:22,color:C.gold}}>KMBSC</div>
          <div style={{fontSize:12,color:C.muted,marginTop:3}}>Kovil Mutual Benefit Savings Chit</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <input ref={eRef} type="email" placeholder="Email address" autoComplete="email"/>
          <input ref={pRef} type="password" placeholder="Password" autoComplete="current-password" onKeyDown={e=>e.key==="Enter"&&go()}/>
          {err&&<div style={{color:C.red,fontSize:13,background:"#2d1515",padding:10,borderRadius:8,textAlign:"center"}}>{err}</div>}
          <button onClick={go} style={{background:C.gold,color:"#000",fontWeight:700,padding:15,fontSize:16,opacity:busy?.6:1}}>
            {busy?"Logging in...":"🔐 Login"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────────
function Dashboard({members,payments}) {
  const tm=curM();
  const totalChit=members.reduce((s,m)=>s+Number(m.chitAmount||0),0);
  const paidNow=payments.filter(p=>p.month===tm&&p.status==="Paid").length;
  const totalCol=payments.filter(p=>p.status==="Paid").reduce((s,p)=>s+Number(p.amount||0),0);
  const pct=members.length>0?Math.round(paidNow/members.length*100):0;
  const cards=[
    {i:"👥",l:"Members",v:members.length,c:C.blue},
    {i:"💰",l:"Total Chit",v:fmt(totalChit),c:C.gold},
    {i:"✅",l:"Paid",v:paidNow,c:C.green},
    {i:"⏳",l:"Pending",v:members.length-paidNow,c:"#fb923c"},
    {i:"🏦",l:"Collected",v:fmt(totalCol),c:C.gold},
    {i:"📅",l:"Month",v:tm.split(" ")[0],c:C.muted},
  ];
  return (
    <div style={{animation:"fadeIn .3s ease"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        {cards.map(x=>(
          <div key={x.l} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14}}>
            <div style={{fontSize:20,marginBottom:5}}>{x.i}</div>
            <div className="mono" style={{fontSize:20,fontWeight:700,color:x.c}}>{x.v}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:3}}>{x.l}</div>
          </div>
        ))}
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14,marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <span style={{fontWeight:600,fontSize:13}}>{tm} Collection</span>
          <span className="mono" style={{color:C.gold,fontWeight:700}}>{pct}%</span>
        </div>
        <div style={{background:"#1e293b",borderRadius:99,height:10}}>
          <div style={{background:`linear-gradient(90deg,${C.gold},#f97316)`,borderRadius:99,height:10,width:`${pct}%`,transition:"width .5s"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.muted,marginTop:5}}>
          <span>{paidNow} paid</span><span>{members.length-paidNow} pending</span>
        </div>
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14}}>
        <b style={{fontSize:14,display:"block",marginBottom:10}}>Recent Payments</b>
        {payments.slice(0,5).length===0
          ?<div style={{color:C.muted,textAlign:"center",padding:20,fontSize:13}}>No payments yet</div>
          :payments.slice(0,5).map(p=>(
            <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${C.border}`}}>
              <div>
                <div style={{fontWeight:600,fontSize:14}}>{p.memberName}</div>
                <div style={{fontSize:11,color:C.muted}}>{p.month} · {p.date}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div className="mono" style={{color:C.green,fontWeight:700}}>{fmt(p.amount)}</div>
                <Badge s={p.status}/>
              </div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

// ── Members ───────────────────────────────────────────────────
function Members({members,setMembers,payments,showToast}) {
  const [search,setSearch]=useState("");
  const [mode,setMode]=useState(null); // null|add|edit|detail
  const [sel,setSel]=useState(null);
  const blank={name:"",phone:"",chitAmount:"",joinDate:"",status:"Active",notes:""};
  const [form,setForm]=useState(blank);
  const filtered=members.filter(m=>m.name.toLowerCase().includes(search.toLowerCase())||m.phone.includes(search));
  const mPay=id=>payments.filter(p=>p.memberId===id);

  const save=async()=>{
    if(!form.name.trim()||!form.phone.trim()) return alert("Name & Phone required!");
    const fb=window.__fb;
    try{
      if(mode==="edit"){
        await fb.updateDoc(fb.doc(fb.db,"members",sel.id),form);
        setMembers(p=>p.map(m=>m.id===sel.id?{...m,...form}:m));
        showToast("Updated!");
      } else {
        const r=await fb.addDoc(fb.collection(fb.db,"members"),form);
        setMembers(p=>[...p,{id:r.id,...form}]);
        showToast("Member added!");
      }
      setMode(null);
    } catch{showToast("Error","err");}
  };

  const del=async(id,e)=>{
    e.stopPropagation();
    if(!confirm("Delete?"))return;
    try{
      await window.__fb.deleteDoc(window.__fb.doc(window.__fb.db,"members",id));
      setMembers(p=>p.filter(m=>m.id!==id));
      showToast("Deleted","err");
    }catch{showToast("Error","err");}
  };

  return (
    <div style={{animation:"fadeIn .3s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <b style={{fontSize:18}}>Members ({members.length})</b>
        <button onClick={()=>{setForm(blank);setMode("add");}} style={{background:C.gold,color:"#000",fontWeight:700,padding:"9px 16px",fontSize:13}}>+ Add</button>
      </div>
      <input placeholder="🔍 Search..." value={search} onChange={e=>setSearch(e.target.value)} style={{marginBottom:14}}/>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {filtered.map(m=>{
          const paid=mPay(m.id).filter(p=>p.status==="Paid").length;
          return(
            <div key={m.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16}} onClick={()=>{setSel(m);setMode("detail");}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <div>
                  <div style={{fontWeight:700,fontSize:15}}>{m.name}</div>
                  <div style={{fontSize:12,color:C.muted}}>{m.phone}</div>
                </div>
                <Badge s={m.status}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
                <span style={{color:C.muted}}>Chit Amount</span>
                <span className="mono" style={{color:C.gold,fontWeight:700}}>{fmt(m.chitAmount)}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:12}}>
                <span style={{color:C.muted}}>Payments Made</span>
                <span className="mono" style={{color:C.green}}>{paid}</span>
              </div>
              <div style={{display:"flex",gap:8}} onClick={e=>e.stopPropagation()}>
                <button onClick={e=>{e.stopPropagation();setSel(m);setForm({...m});setMode("edit");}} style={{flex:1,background:"#1e293b",color:C.blue,padding:"9px 0",fontSize:13}}>✏️ Edit</button>
                <button onClick={e=>del(m.id,e)} style={{flex:1,background:"#1e293b",color:C.red,padding:"9px 0",fontSize:13}}>🗑️ Delete</button>
              </div>
            </div>
          );
        })}
        {filtered.length===0&&<div style={{color:C.muted,textAlign:"center",padding:40}}>No members found</div>}
      </div>

      {(mode==="add"||mode==="edit")&&(
        <Modal title={mode==="edit"?"Edit Member":"Add Member"} onClose={()=>setMode(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:11}}>
            <input placeholder="Full Name *" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
            <input placeholder="Phone *" value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))}/>
            <input type="number" placeholder="Chit Amount (₹)" value={form.chitAmount} onChange={e=>setForm(f=>({...f,chitAmount:e.target.value}))}/>
            <input type="date" value={form.joinDate} onChange={e=>setForm(f=>({...f,joinDate:e.target.value}))}/>
            <select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}><option>Active</option><option>Inactive</option></select>
            <textarea rows={2} placeholder="Notes" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/>
            <button onClick={save} style={{background:C.gold,color:"#000",fontWeight:700,padding:13,fontSize:15}}>{mode==="edit"?"Update":"Add Member"}</button>
          </div>
        </Modal>
      )}

      {mode==="detail"&&sel&&(
        <Modal title={sel.name} onClose={()=>setMode(null)}>
          {[["📞",sel.phone],["💰",fmt(sel.chitAmount)],["📅",sel.joinDate||"-"],["📝",sel.notes||"-"]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:`1px solid ${C.border}`}}>
              <span style={{color:C.muted,fontSize:13}}>{k}</span>
              <span style={{fontWeight:600,fontSize:13}}>{v}</span>
            </div>
          ))}
          <b style={{display:"block",margin:"14px 0 8px",color:C.gold,fontSize:13}}>Payment History</b>
          {mPay(sel.id).length===0
            ?<div style={{color:C.muted,textAlign:"center",padding:16,fontSize:13}}>No payments yet</div>
            :mPay(sel.id).map(p=>(
              <div key={p.id} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"6px 0",borderBottom:`1px solid ${C.border}`}}>
                <span>{p.month}</span>
                <span className="mono" style={{color:C.green}}>{fmt(p.amount)}</span>
                <Badge s={p.status}/>
              </div>
            ))
          }
        </Modal>
      )}
    </div>
  );
}

// ── Payments ──────────────────────────────────────────────────
function Payments({members,payments,setPayments,showToast}) {
  const tm=curM();
  const [fm,setFm]=useState(tm);
  const [showForm,setShowForm]=useState(false);
  const blank={memberId:"",month:tm,amount:"",date:toStr(),status:"Paid",notes:""};
  const [form,setForm]=useState(blank);
  const allM=[...new Set([tm,...payments.map(p=>p.month)])];
  const filtered=payments.filter(p=>p.month===fm);
  const paidIds=filtered.filter(p=>p.status==="Paid").map(p=>p.memberId);
  const pend=members.filter(m=>!paidIds.includes(m.id));
  const getM=id=>members.find(m=>m.id===id);

  const addPay=async()=>{
    if(!form.memberId)return alert("Select member!");
    const m=getM(form.memberId);
    const data={...form,memberName:m?.name||"-",amount:form.amount||m?.chitAmount||0};
    const fb=window.__fb;
    try{
      const r=await fb.addDoc(fb.collection(fb.db,"payments"),data);
      setPayments(p=>[{id:r.id,...data},...p]);
      showToast("Payment recorded!");
      setShowForm(false);setForm(blank);
    }catch{showToast("Error","err");}
  };

  const delPay=async id=>{
    const fb=window.__fb;
    try{
      await fb.deleteDoc(fb.doc(fb.db,"payments",id));
      setPayments(p=>p.filter(x=>x.id!==id));
      showToast("Deleted","err");
    }catch{showToast("Error","err");}
  };

  return (
    <div style={{animation:"fadeIn .3s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <b style={{fontSize:18}}>Payments</b>
        <button onClick={()=>setShowForm(true)} style={{background:C.gold,color:"#000",fontWeight:700,padding:"9px 16px",fontSize:13}}>+ Record</button>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        {allM.map(m=>(
          <button key={m} onClick={()=>setFm(m)} style={{padding:"6px 14px",background:m===fm?C.gold:C.card,color:m===fm?"#000":C.muted,border:`1px solid ${m===fm?C.gold:C.border}`,fontWeight:m===fm?700:400,fontSize:12}}>
            {m}
          </button>
        ))}
      </div>
      {pend.length>0&&(
        <div style={{background:"#1c1208",border:"1px solid #92400e",borderRadius:12,padding:12,marginBottom:12}}>
          <div style={{fontWeight:700,color:"#fb923c",fontSize:13,marginBottom:6}}>⏳ Pending ({pend.length})</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {pend.map(m=><span key={m.id} style={{background:"#292117",color:"#fbbf24",padding:"3px 10px",borderRadius:20,fontSize:12}}>{m.name}</span>)}
          </div>
        </div>
      )}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden"}}>
        {filtered.length===0
          ?<div style={{textAlign:"center",padding:36,color:C.muted,fontSize:13}}>No payments for {fm}</div>
          :filtered.map(p=>(
            <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",borderBottom:`1px solid ${C.border}`}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:14}}>{p.memberName}</div>
                <div style={{fontSize:11,color:C.muted}}>{p.date}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                <span className="mono" style={{color:C.green,fontWeight:700,fontSize:13}}>{fmt(p.amount)}</span>
                <Badge s={p.status}/>
                <button onClick={()=>delPay(p.id)} style={{background:"none",color:C.red,fontSize:16,padding:"2px 4px"}}>🗑️</button>
              </div>
            </div>
          ))
        }
      </div>
      {showForm&&(
        <Modal title="Record Payment" onClose={()=>setShowForm(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:11}}>
            <select value={form.memberId} onChange={e=>{const m=getM(e.target.value);setForm(f=>({...f,memberId:e.target.value,amount:m?.chitAmount||""}));}}>
              <option value="">Select Member *</option>
              {members.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
            </select>
            <input placeholder="Month (e.g. Apr 2026)" value={form.month} onChange={e=>setForm(f=>({...f,month:e.target.value}))}/>
            <input type="number" placeholder="Amount (₹)" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/>
            <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
            <select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}><option>Paid</option><option>Pending</option></select>
            <textarea rows={2} placeholder="Notes" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/>
            <button onClick={addPay} style={{background:C.gold,color:"#000",fontWeight:700,padding:13,fontSize:15}}>Record Payment</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────
function App() {
  const [ready,setReady]=useState(!!window.__fb);
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("dashboard");
  const [members,setMembers]=useState([]);
  const [payments,setPayments]=useState([]);
  const [toast,setToast]=useState(null);

  useEffect(()=>{
    const init=()=>{
      setReady(true);
      const fb=window.__fb;
      fb.onAuthStateChanged(fb.auth, async u=>{
        setUser(u);
        if(u){
          try{
            const [ms,ps]=await Promise.all([
              fb.getDocs(fb.query(fb.collection(fb.db,"members"),fb.orderBy("name"))),
              fb.getDocs(fb.query(fb.collection(fb.db,"payments"),fb.orderBy("date","desc")))
            ]);
            setMembers(ms.docs.map(d=>({id:d.id,...d.data()})));
            setPayments(ps.docs.map(d=>({id:d.id,...d.data()})));
          }catch{}
        }
        setLoading(false);
      });
    };
    if(window.__fb) init();
    else window.addEventListener('fbready',init,{once:true});
  },[]);

  const showToast=(msg,type="ok")=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),2500);
  };

  if(!ready||loading) return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{width:40,height:40,border:`4px solid ${C.border}`,borderTop:`4px solid ${C.gold}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
      <div style={{color:C.muted,fontSize:14}}>Loading...</div>
    </div>
  );

  if(!user) return <Login/>;

  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      {toast&&(
        <div style={{position:"fixed",top:12,right:12,zIndex:999,background:toast.type==="ok"?"#14532d":"#7f1d1d",color:"#fff",padding:"10px 16px",borderRadius:10,fontSize:13,fontWeight:600,boxShadow:"0 4px 20px rgba(0,0,0,.5)"}}>
          {toast.type==="ok"?"✅ ":"❌ "}{toast.msg}
        </div>
      )}
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"0 14px",display:"flex",alignItems:"center",justifyContent:"space-between",height:52}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:30,height:30,background:C.gold,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>🏛️</div>
          <div>
            <div style={{fontWeight:700,fontSize:13,color:C.gold}}>KMBSC</div>
            <div style={{fontSize:10,color:C.muted}}>Kovil Mutual Benefit Savings Chit</div>
          </div>
        </div>
        <button onClick={()=>window.__fb.signOut(window.__fb.auth)} style={{background:"#1e293b",color:C.red,fontSize:12,padding:"6px 12px"}}>Logout</button>
      </div>
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,display:"flex",overflowX:"auto"}}>
        {[["dashboard","📊 Dashboard"],["members","👥 Members"],["payments","💳 Payments"]].map(([id,lbl])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:"12px 16px",background:"none",color:tab===id?C.gold:C.muted,fontWeight:tab===id?700:400,borderBottom:tab===id?`2px solid ${C.gold}`:"2px solid transparent",borderRadius:0,fontSize:13,whiteSpace:"nowrap",flexShrink:0}}>
            {lbl}
          </button>
        ))}
      </div>
      <div style={{padding:"14px",maxWidth:700,margin:"0 auto"}}>
        {tab==="dashboard"&&<Dashboard members={members} payments={payments}/>}
        {tab==="members"&&<Members members={members} setMembers={setMembers} payments={payments} showToast={showToast}/>}
        {tab==="payments"&&<Payments members={members} payments={payments} setPayments={setPayments} showToast={showToast}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
