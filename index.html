<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>KMBSC Portal</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f1117;color:#e2e8f0;font-family:'Sora',sans-serif;-webkit-text-size-adjust:none;text-size-adjust:none;overflow-x:hidden;}
input,select,textarea{background:#12151f;border:1px solid #2a2d3e;color:#e2e8f0;border-radius:10px;padding:13px 14px;font-size:16px;width:100%;outline:none;font-family:'Sora',sans-serif;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:#f5c842;}
button{cursor:pointer;font-family:'Sora',sans-serif;border:none;border-radius:10px;-webkit-tap-highlight-color:transparent;}
button:active{opacity:.75;}
textarea{resize:vertical;font-size:15px;}
.mono{font-family:'Courier New',monospace;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#2a2d3e;border-radius:3px;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBVGVu59jDZybPFAX_pRisSrQRoXHQ0EWY",
  authDomain: "kmbsc-chit.firebaseapp.com",
  projectId: "kmbsc-chit",
  storageBucket: "kmbsc-chit.firebasestorage.app",
  messagingSenderId: "511325458985",
  appId: "1:511325458985:web:7539c92a18c77daa05c238"
});

window.__fb = {
  auth: getAuth(app), db: getFirestore(app),
  signInWithEmailAndPassword, signOut, onAuthStateChanged,
  collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy
};
window.dispatchEvent(new Event('fbready'));
</script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const C = { bg:"#0f1117", card:"#1a1d27", border:"#2a2d3e", gold:"#f5c842", green:"#22c55e", red:"#ef4444", blue:"#60a5fa", muted:"#64748b", purple:"#a78bfa" };
const MO = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const curM = () => { const d=new Date(); return `${MO[d.getMonth()]} ${d.getFullYear()}`; };
const fmt = n => "₹"+Number(n||0).toLocaleString("en-IN");
const toStr = () => new Date().toISOString().slice(0,10);

function Badge({s}) {
  const m={Paid:{bg:"#14532d",c:"#4ade80"},Pending:{bg:"#7c2d12",c:"#fb923c"},Active:{bg:"#1e3a5f",c:"#60a5fa"},Inactive:{bg:"#3b0764",c:"#a78bfa"}};
  const x=m[s]||{bg:"#1e293b",c:"#94a3b8"};
  return <span style={{background:x.bg,color:x.c,borderRadius:20,padding:"2px 10px",fontSize:12,fontWeight:600}}>{s}</span>;
}

function Modal({title,onClose,children}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:200,overflowY:"auto",padding:"12px"}} onClick={onClose}>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:20,width:"100%",maxWidth:440,margin:"10px auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <b style={{fontSize:16}}>{title}</b>
          <button onClick={onClose} style={{background:"none",color:C.muted,fontSize:24,lineHeight:1,padding:"0 4px"}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── Login ─────────────────────────────────────────────────────
function Login({groups, onMemberLogin}) {
  const [mode, setMode] = useState("admin"); // admin | member
  const eRef=useRef(); const pRef=useRef();
  const [selGroup, setSelGroup] = useState("");
  const [memberPass, setMemberPass] = useState("");
  const [err,setErr]=useState(""); const [busy,setBusy]=useState(false);

  const doAdmin=async()=>{
    const e=eRef.current.value.trim(),p=pRef.current.value;
    if(!e||!p){setErr("Email & Password தேவை!");return;}
    setBusy(true);setErr("");
    try{await window.__fb.signInWithEmailAndPassword(window.__fb.auth,e,p);}
    catch{setErr("தவறான Email / Password");setBusy(false);}
  };

  const doMember=()=>{
    if(!selGroup){setErr("Group select பண்ணுங்க!");return;}
    const group = groups.find(g=>g.id===selGroup);
    if(!group){setErr("Group not found!");return;}
    if(!memberPass){setErr("Password தேவை!");return;}
    if(memberPass !== group.password){setErr("தவறான Password!");return;}
    onMemberLogin(group);
  };

  return (
    <div style={{minHeight:"100vh",background:C.bg,padding:"40px 16px 20px"}}>
      <div style={{maxWidth:380,margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{width:56,height:56,background:C.gold,borderRadius:14,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:26,marginBottom:10}}>🏛️</div>
          <div style={{fontWeight:700,fontSize:24,color:C.gold}}>KMBSC</div>
          <div style={{fontSize:12,color:C.muted,marginTop:3}}>Kovil Mutual Benefit Savings Chit</div>
        </div>

        {/* Toggle */}
        <div style={{display:"flex",background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:4,marginBottom:20}}>
          <button onClick={()=>{setMode("admin");setErr("");}} style={{flex:1,padding:"10px",background:mode==="admin"?C.gold:"none",color:mode==="admin"?"#000":C.muted,fontWeight:mode==="admin"?700:400,fontSize:14}}>
            🔐 Admin
          </button>
          <button onClick={()=>{setMode("member");setErr("");}} style={{flex:1,padding:"10px",background:mode==="member"?C.blue:"none",color:mode==="member"?"#fff":C.muted,fontWeight:mode==="member"?700:400,fontSize:14}}>
            👥 Member
          </button>
        </div>

        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:20}}>
          {mode==="admin" ? (
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <input ref={eRef} type="email" placeholder="Admin Email" autoComplete="email"/>
              <input ref={pRef} type="password" placeholder="Admin Password" autoComplete="current-password" onKeyDown={e=>e.key==="Enter"&&doAdmin()}/>
              {err&&<div style={{color:C.red,fontSize:13,background:"#2d1515",padding:10,borderRadius:8,textAlign:"center"}}>{err}</div>}
              <button onClick={doAdmin} style={{background:C.gold,color:"#000",fontWeight:700,padding:15,fontSize:16,opacity:busy?.6:1}}>
                {busy?"Logging in...":"🔐 Admin Login"}
              </button>
            </div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <select value={selGroup} onChange={e=>setSelGroup(e.target.value)}>
                <option value="">Select Your Group</option>
                {groups.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
              </select>
              <input type="password" placeholder="Group Password" value={memberPass} onChange={e=>setMemberPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doMember()}/>
              {err&&<div style={{color:C.red,fontSize:13,background:"#2d1515",padding:10,borderRadius:8,textAlign:"center"}}>{err}</div>}
              <button onClick={doMember} style={{background:C.blue,color:"#fff",fontWeight:700,padding:15,fontSize:16}}>
                👥 Member Login
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Member View (Read Only) ───────────────────────────────────
function MemberView({group, members, payments, onLogout}) {
  const tm = curM();
  const gMembers = members.filter(m=>m.groupId===group.id);
  const [filterMonth, setFilterMonth] = useState(tm);
  const allMonths = [...new Set([tm,...payments.map(p=>p.month)])];

  const monthPayments = payments.filter(p=>p.month===filterMonth);
  const paidIds = monthPayments.filter(p=>p.status==="Paid").map(p=>p.memberId);
  const pendingMembers = gMembers.filter(m=>!paidIds.includes(m.id));
  const paidCount = gMembers.filter(m=>paidIds.includes(m.id)).length;
  const pct = gMembers.length>0?Math.round(paidCount/gMembers.length*100):0;

  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      {/* Header */}
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"0 14px",display:"flex",alignItems:"center",justifyContent:"space-between",height:52}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:30,height:30,background:C.blue,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>👥</div>
          <div>
            <div style={{fontWeight:700,fontSize:13,color:C.blue}}>{group.name}</div>
            <div style={{fontSize:10,color:C.muted}}>Member View · Read Only</div>
          </div>
        </div>
        <button onClick={onLogout} style={{background:"#1e293b",color:C.red,fontSize:12,padding:"6px 12px"}}>Logout</button>
      </div>

      <div style={{padding:"14px",maxWidth:700,margin:"0 auto"}}>
        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          {[
            {i:"👥",l:"Members",v:gMembers.length,c:C.blue},
            {i:"💰",l:"Chit Amount",v:fmt(group.chitAmount),c:C.gold},
            {i:"✅",l:"Paid",v:paidCount,c:C.green},
            {i:"⏳",l:"Pending",v:gMembers.length-paidCount,c:"#fb923c"},
          ].map(x=>(
            <div key={x.l} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14}}>
              <div style={{fontSize:20,marginBottom:5}}>{x.i}</div>
              <div className="mono" style={{fontSize:20,fontWeight:700,color:x.c}}>{x.v}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:3}}>{x.l}</div>
            </div>
          ))}
        </div>

        {/* Progress */}
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <span style={{fontWeight:600,fontSize:13}}>{filterMonth} Collection</span>
            <span className="mono" style={{color:C.gold,fontWeight:700}}>{pct}%</span>
          </div>
          <div style={{background:"#1e293b",borderRadius:99,height:10}}>
            <div style={{background:`linear-gradient(90deg,${C.gold},#f97316)`,borderRadius:99,height:10,width:`${pct}%`,transition:"width .5s"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.muted,marginTop:5}}>
            <span>{paidCount} paid</span><span>{gMembers.length-paidCount} pending</span>
          </div>
        </div>

        {/* Month filter */}
        <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
          {allMonths.map(m=>(
            <button key={m} onClick={()=>setFilterMonth(m)} style={{padding:"6px 14px",background:m===filterMonth?C.gold:C.card,color:m===filterMonth?"#000":C.muted,border:`1px solid ${m===filterMonth?C.gold:C.border}`,fontWeight:m===filterMonth?700:400,fontSize:12}}>{m}</button>
          ))}
        </div>

        {/* Pending */}
        {pendingMembers.length>0&&(
          <div style={{background:"#1c1208",border:"1px solid #92400e",borderRadius:12,padding:12,marginBottom:12}}>
            <div style={{fontWeight:700,color:"#fb923c",fontSize:13,marginBottom:6}}>⏳ Pending ({pendingMembers.length})</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {pendingMembers.map(m=><span key={m.id} style={{background:"#292117",color:"#fbbf24",padding:"3px 10px",borderRadius:20,fontSize:12}}>{m.name}</span>)}
            </div>
          </div>
        )}

        {/* Members list with status */}
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden"}}>
          <div style={{padding:"12px 14px",borderBottom:`1px solid ${C.border}`,fontWeight:700,fontSize:14}}>
            Members Status — {filterMonth}
          </div>
          {gMembers.length===0
            ?<div style={{textAlign:"center",padding:30,color:C.muted,fontSize:13}}>No members in this group</div>
            :gMembers.map(m=>{
              const paid = paidIds.includes(m.id);
              const payment = monthPayments.find(p=>p.memberId===m.id);
              return(
                <div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",borderBottom:`1px solid ${C.border}`}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:14}}>{m.name}</div>
                    <div style={{fontSize:11,color:C.muted}}>{m.phone}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    {payment&&<div className="mono" style={{color:C.green,fontSize:13,fontWeight:700}}>{fmt(payment.amount)}</div>}
                    <Badge s={paid?"Paid":"Pending"}/>
                  </div>
                </div>
              );
            })
          }
        </div>
      </div>
    </div>
  );
}

// ── Groups Tab (Admin) ────────────────────────────────────────
function Groups({groups,setGroups,showToast}) {
  const [showForm,setShowForm]=useState(false);
  const [editG,setEditG]=useState(null);
  const blank={name:"",chitAmount:"",password:"",description:""};
  const [form,setForm]=useState(blank);
  const [showPass, setShowPass]=useState({});

  const save=async()=>{
    if(!form.name.trim()) return alert("Group name தேவை!");
    if(!form.password.trim()) return alert("Group password தேவை!");
    const fb=window.__fb;
    try{
      if(editG){
        await fb.updateDoc(fb.doc(fb.db,"groups",editG.id),form);
        setGroups(p=>p.map(g=>g.id===editG.id?{...g,...form}:g));
        showToast("Group updated!");
      } else {
        const r=await fb.addDoc(fb.collection(fb.db,"groups"),{...form,createdAt:toStr()});
        setGroups(p=>[...p,{id:r.id,...form,createdAt:toStr()}]);
        showToast("Group added!");
      }
      setShowForm(false);setEditG(null);setForm(blank);
    }catch{showToast("Error","err");}
  };

  const del=async(id)=>{
    if(!confirm("Delete this group?")) return;
    try{
      await window.__fb.deleteDoc(window.__fb.doc(window.__fb.db,"groups",id));
      setGroups(p=>p.filter(g=>g.id!==id));
      showToast("Deleted","err");
    }catch{showToast("Error","err");}
  };

  return (
    <div style={{animation:"fadeIn .3s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <b style={{fontSize:18}}>Groups ({groups.length})</b>
        <button onClick={()=>{setForm(blank);setEditG(null);setShowForm(true);}} style={{background:C.gold,color:"#000",fontWeight:700,padding:"9px 16px",fontSize:13}}>+ New Group</button>
      </div>

      {groups.length===0&&(
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:30,textAlign:"center",color:C.muted}}>
          <div style={{fontSize:32,marginBottom:8}}>🗂️</div>
          <div>No groups yet — Create your first group!</div>
        </div>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {groups.map((g,i)=>(
          <div key={g.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
              <div style={{width:36,height:36,background:C.gold,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:"#000",fontSize:14}}>{i+1}</div>
              <div>
                <div style={{fontWeight:700,fontSize:16}}>{g.name}</div>
                {g.description&&<div style={{fontSize:12,color:C.muted}}>{g.description}</div>}
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:8}}>
              <span style={{color:C.muted}}>Chit Amount</span>
              <span className="mono" style={{color:C.gold,fontWeight:700}}>{fmt(g.chitAmount)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13,marginBottom:12,background:"#12151f",padding:"8px 12px",borderRadius:8}}>
              <span style={{color:C.muted}}>🔑 Password</span>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span className="mono" style={{color:C.purple,fontWeight:700}}>
                  {showPass[g.id] ? g.password : "••••••••"}
                </span>
                <button onClick={()=>setShowPass(p=>({...p,[g.id]:!p[g.id]}))} style={{background:"none",color:C.muted,fontSize:14,padding:"2px 6px"}}>
                  {showPass[g.id]?"🙈":"👁️"}
                </button>
              </div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{setEditG(g);setForm({name:g.name,chitAmount:g.chitAmount||"",password:g.password||"",description:g.description||""});setShowForm(true);}} style={{flex:1,background:"#1e293b",color:C.blue,padding:"8px 0",fontSize:13}}>✏️ Edit</button>
              <button onClick={()=>del(g.id)} style={{flex:1,background:"#1e293b",color:C.red,padding:"8px 0",fontSize:13}}>🗑️ Delete</button>
            </div>
          </div>
        ))}
      </div>

      {showForm&&(
        <Modal title={editG?"Edit Group":"New Group"} onClose={()=>{setShowForm(false);setEditG(null);}}>
          <div style={{display:"flex",flexDirection:"column",gap:11}}>
            <input placeholder="Group Name * (e.g. Group 1)" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
            <input type="number" placeholder="Chit Amount (₹)" value={form.chitAmount} onChange={e=>setForm(f=>({...f,chitAmount:e.target.value}))}/>
            <input placeholder="Member Password * (e.g. group1@2026)" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))}/>
            <input placeholder="Description (optional)" value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))}/>
            <div style={{background:"#1a2535",border:"1px solid #1e3a5f",borderRadius:8,padding:10,fontSize:12,color:C.blue}}>
              💡 Members இந்த password use பண்ணி login பண்ணுவாங்க
            </div>
            <button onClick={save} style={{background:C.gold,color:"#000",fontWeight:700,padding:13,fontSize:15}}>{editG?"Update Group":"Create Group"}</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── Members Tab (Admin) ───────────────────────────────────────
function Members({members,setMembers,payments,groups,showToast}) {
  const [search,setSearch]=useState("");
  const [filterGroup,setFilterGroup]=useState("all");
  const [mode,setMode]=useState(null);
  const [sel,setSel]=useState(null);
  const blank={name:"",phone:"",chitAmount:"",joinDate:"",status:"Active",notes:"",groupId:""};
  const [form,setForm]=useState(blank);

  const filtered=members.filter(m=>{
    const ms=m.name.toLowerCase().includes(search.toLowerCase())||m.phone.includes(search);
    const mg=filterGroup==="all"||m.groupId===filterGroup;
    return ms&&mg;
  });

  const mPay=id=>payments.filter(p=>p.memberId===id);
  const getGName=id=>groups.find(g=>g.id===id)?.name||"No Group";

  const save=async()=>{
    if(!form.name.trim()||!form.phone.trim()) return alert("Name & Phone required!");
    const fb=window.__fb;
    try{
      if(mode==="edit"){
        await fb.updateDoc(fb.doc(fb.db,"members",sel.id),form);
        setMembers(p=>p.map(m=>m.id===sel.id?{...m,...form}:m));
        showToast("Updated!");
      } else {
        const r=await fb.addDoc(fb.collection(fb.db,"members"),form);
        setMembers(p=>[...p,{id:r.id,...form}]);
        showToast("Member added!");
      }
      setMode(null);
    }catch{showToast("Error","err");}
  };

  const del=async(id,e)=>{
    e.stopPropagation();
    if(!confirm("Delete?"))return;
    try{
      await window.__fb.deleteDoc(window.__fb.doc(window.__fb.db,"members",id));
      setMembers(p=>p.filter(m=>m.id!==id));
      showToast("Deleted","err");
    }catch{showToast("Error","err");}
  };

  return (
    <div style={{animation:"fadeIn .3s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <b style={{fontSize:18}}>Members ({filtered.length})</b>
        <button onClick={()=>{setForm(blank);setMode("add");}} style={{background:C.gold,color:"#000",fontWeight:700,padding:"9px 16px",fontSize:13}}>+ Add</button>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        <button onClick={()=>setFilterGroup("all")} style={{padding:"6px 14px",background:filterGroup==="all"?C.gold:C.card,color:filterGroup==="all"?"#000":C.muted,border:`1px solid ${filterGroup==="all"?C.gold:C.border}`,fontWeight:filterGroup==="all"?700:400,fontSize:12}}>All</button>
        {groups.map(g=>(
          <button key={g.id} onClick={()=>setFilterGroup(g.id)} style={{padding:"6px 14px",background:filterGroup===g.id?C.gold:C.card,color:filterGroup===g.id?"#000":C.muted,border:`1px solid ${filterGroup===g.id?C.gold:C.border}`,fontWeight:filterGroup===g.id?700:400,fontSize:12}}>{g.name}</button>
        ))}
      </div>

      <input placeholder="🔍 Search..." value={search} onChange={e=>setSearch(e.target.value)} style={{marginBottom:14}}/>

      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {filtered.map(m=>{
          const paid=mPay(m.id).filter(p=>p.status==="Paid").length;
          return(
            <div key={m.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16}} onClick={()=>{setSel(m);setMode("detail");}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <div>
                  <div style={{fontWeight:700,fontSize:15}}>{m.name}</div>
                  <div style={{fontSize:12,color:C.muted}}>{m.phone}</div>
                </div>
                <Badge s={m.status}/>
              </div>
              <span style={{display:"inline-block",background:"#1e293b",color:C.purple,padding:"2px 10px",borderRadius:20,fontSize:11,marginBottom:8}}>{getGName(m.groupId)}</span>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
                <span style={{color:C.muted}}>Chit Amount</span>
                <span className="mono" style={{color:C.gold,fontWeight:700}}>{fmt(m.chitAmount)}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:12}}>
                <span style={{color:C.muted}}>Payments Made</span>
                <span className="mono" style={{color:C.green}}>{paid}</span>
              </div>
              <div style={{display:"flex",gap:8}} onClick={e=>e.stopPropagation()}>
                <button onClick={e=>{e.stopPropagation();setSel(m);setForm({name:m.name,phone:m.phone,chitAmount:m.chitAmount||"",joinDate:m.joinDate||"",status:m.status,notes:m.notes||"",groupId:m.groupId||""});setMode("edit");}} style={{flex:1,background:"#1e293b",color:C.blue,padding:"9px 0",fontSize:13}}>✏️ Edit</button>
                <button onClick={e=>del(m.id,e)} style={{flex:1,background:"#1e293b",color:C.red,padding:"9px 0",fontSize:13}}>🗑️ Delete</button>
              </div>
            </div>
          );
        })}
        {filtered.length===0&&<div style={{color:C.muted,textAlign:"center",padding:40}}>No members found</div>}
      </div>

      {(mode==="add"||mode==="edit")&&(
        <Modal title={mode==="edit"?"Edit Member":"Add Member"} onClose={()=>setMode(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:11}}>
            <input placeholder="Full Name *" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
            <input placeholder="Phone *" value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))}/>
            <input type="number" placeholder="Chit Amount (₹)" value={form.chitAmount} onChange={e=>setForm(f=>({...f,chitAmount:e.target.value}))}/>
            <select value={form.groupId} onChange={e=>setForm(f=>({...f,groupId:e.target.value}))}>
              <option value="">Select Group</option>
              {groups.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
            </select>
            <input type="date" value={form.joinDate} onChange={e=>setForm(f=>({...f,joinDate:e.target.value}))}/>
            <select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}><option>Active</option><option>Inactive</option></select>
            <textarea rows={2} placeholder="Notes" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/>
            <button onClick={save} style={{background:C.gold,color:"#000",fontWeight:700,padding:13,fontSize:15}}>{mode==="edit"?"Update":"Add Member"}</button>
          </div>
        </Modal>
      )}

      {mode==="detail"&&sel&&(
        <Modal title={sel.name} onClose={()=>setMode(null)}>
          {[["👥 Group",getGName(sel.groupId)],["📞 Phone",sel.phone],["💰 Chit",fmt(sel.chitAmount)],["📅 Join",sel.joinDate||"-"],["📝 Notes",sel.notes||"-"]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:`1px solid ${C.border}`}}>
              <span style={{color:C.muted,fontSize:13}}>{k}</span>
              <span style={{fontWeight:600,fontSize:13}}>{v}</span>
            </div>
          ))}
          <b style={{display:"block",margin:"14px 0 8px",color:C.gold,fontSize:13}}>Payment History</b>
          {mPay(sel.id).length===0
            ?<div style={{color:C.muted,textAlign:"center",padding:16,fontSize:13}}>No payments yet</div>
            :mPay(sel.id).map(p=>(
              <div key={p.id} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"6px 0",borderBottom:`1px solid ${C.border}`}}>
                <span>{p.month}</span>
                <span className="mono" style={{color:C.green}}>{fmt(p.amount)}</span>
                <Badge s={p.status}/>
              </div>
            ))
          }
        </Modal>
      )}
    </div>
  );
}

// ── Payments Tab (Admin) ──────────────────────────────────────
function Payments({members,payments,setPayments,groups,showToast}) {
  const tm=curM();
  const allMonths=[...new Set([tm,...payments.map(p=>p.month)])];
  const [filterMonth,setFilterMonth]=useState(tm);
  const [filterGroup,setFilterGroup]=useState("all");
  const [showForm,setShowForm]=useState(false);
  const [editPay,setEditPay]=useState(null);
  const blank={memberId:"",month:tm,amount:"",date:toStr(),status:"Paid",notes:""};
  const [form,setForm]=useState(blank);

  const filteredMembers=filterGroup==="all"?members:members.filter(m=>m.groupId===filterGroup);
  const filteredPayments=payments.filter(p=>{
    const mMatch=p.month===filterMonth;
    const gMatch=filterGroup==="all"||filteredMembers.some(m=>m.id===p.memberId);
    return mMatch&&gMatch;
  });

  const paidIds=filteredPayments.filter(p=>p.status==="Paid").map(p=>p.memberId);
  const pend=filteredMembers.filter(m=>!paidIds.includes(m.id));
  const getM=id=>members.find(m=>m.id===id);

  const savePay=async()=>{
    if(!form.memberId) return alert("Select member!");
    const m=getM(form.memberId);
    const data={...form,memberName:m?.name||"-",amount:form.amount||m?.chitAmount||0};
    const fb=window.__fb;
    try{
      if(editPay){
        await fb.updateDoc(fb.doc(fb.db,"payments",editPay.id),data);
        setPayments(p=>p.map(x=>x.id===editPay.id?{...x,...data}:x));
        showToast("Payment updated!");
      } else {
        const r=await fb.addDoc(fb.collection(fb.db,"payments"),data);
        setPayments(p=>[{id:r.id,...data},...p]);
        showToast("Payment recorded!");
      }
      setShowForm(false);setEditPay(null);setForm(blank);
    }catch{showToast("Error","err");}
  };

  const delPay=async id=>{
    if(!confirm("Delete payment?")) return;
    const fb=window.__fb;
    try{
      await fb.deleteDoc(fb.doc(fb.db,"payments",id));
      setPayments(p=>p.filter(x=>x.id!==id));
      showToast("Deleted","err");
    }catch{showToast("Error","err");}
  };

  const openEdit=(p)=>{
    setEditPay(p);
    setForm({memberId:p.memberId,month:p.month,amount:p.amount,date:p.date,status:p.status,notes:p.notes||""});
    setShowForm(true);
  };

  return (
    <div style={{animation:"fadeIn .3s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <b style={{fontSize:18}}>Payments</b>
        <button onClick={()=>{setEditPay(null);setForm(blank);setShowForm(true);}} style={{background:C.gold,color:"#000",fontWeight:700,padding:"9px 16px",fontSize:13}}>+ Record</button>
      </div>

      {/* Group filter */}
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        <button onClick={()=>setFilterGroup("all")} style={{padding:"6px 14px",background:filterGroup==="all"?C.purple:C.card,color:filterGroup==="all"?"#fff":C.muted,border:`1px solid ${filterGroup==="all"?C.purple:C.border}`,fontWeight:filterGroup==="all"?700:400,fontSize:12}}>All Groups</button>
        {groups.map(g=>(
          <button key={g.id} onClick={()=>setFilterGroup(g.id)} style={{padding:"6px 14px",background:filterGroup===g.id?C.purple:C.card,color:filterGroup===g.id?"#fff":C.muted,border:`1px solid ${filterGroup===g.id?C.purple:C.border}`,fontWeight:filterGroup===g.id?700:400,fontSize:12}}>{g.name}</button>
        ))}
      </div>

      {/* Month filter — FIXED with add/edit */}
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        {allMonths.map(m=>(
          <button key={m} onClick={()=>setFilterMonth(m)} style={{padding:"6px 14px",background:m===filterMonth?C.blue:C.card,color:m===filterMonth?"#fff":C.muted,border:`1px solid ${m===filterMonth?C.blue:C.border}`,fontWeight:m===filterMonth?700:400,fontSize:12}}>{m}</button>
        ))}
      </div>

      {/* Pending */}
      {pend.length>0&&(
        <div style={{background:"#1c1208",border:"1px solid #92400e",borderRadius:12,padding:12,marginBottom:12}}>
          <div style={{fontWeight:700,color:"#fb923c",fontSize:13,marginBottom:6}}>⏳ Pending ({pend.length})</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {pend.map(m=><span key={m.id} style={{background:"#292117",color:"#fbbf24",padding:"3px 10px",borderRadius:20,fontSize:12}}>{m.name}</span>)}
          </div>
        </div>
      )}

      {/* Payment list */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden"}}>
        {filteredPayments.length===0
          ?<div style={{textAlign:"center",padding:36,color:C.muted,fontSize:13}}>No payments for {filterMonth}</div>
          :filteredPayments.map(p=>(
            <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",borderBottom:`1px solid ${C.border}`}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:14}}>{p.memberName}</div>
                <div style={{fontSize:11,color:C.muted}}>{p.date} · {p.month}</div>
                {p.notes&&<div style={{fontSize:11,color:C.muted}}>{p.notes}</div>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                <span className="mono" style={{color:C.green,fontWeight:700,fontSize:13}}>{fmt(p.amount)}</span>
                <Badge s={p.status}/>
                <button onClick={()=>openEdit(p)} style={{background:"none",color:C.blue,fontSize:16,padding:"2px 4px"}}>✏️</button>
                <button onClick={()=>delPay(p.id)} style={{background:"none",color:C.red,fontSize:16,padding:"2px 4px"}}>🗑️</button>
              </div>
            </div>
          ))
        }
      </div>

      {showForm&&(
        <Modal title={editPay?"Edit Payment":"Record Payment"} onClose={()=>{setShowForm(false);setEditPay(null);}}>
          <div style={{display:"flex",flexDirection:"column",gap:11}}>
            <select value={form.memberId} onChange={e=>{const m=getM(e.target.value);setForm(f=>({...f,memberId:e.target.value,amount:m?.chitAmount||""}));}}>
              <option value="">Select Member *</option>
              {groups.map(g=>(
                <optgroup key={g.id} label={g.name}>
                  {members.filter(m=>m.groupId===g.id).map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
                </optgroup>
              ))}
              {members.filter(m=>!m.groupId).length>0&&(
                <optgroup label="No Group">
                  {members.filter(m=>!m.groupId).map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
                </optgroup>
              )}
            </select>
            <input placeholder="Month (e.g. May 2026)" value={form.month} onChange={e=>setForm(f=>({...f,month:e.target.value}))}/>
            <input type="number" placeholder="Amount (₹)" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/>
            <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
            <select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}><option>Paid</option><option>Pending</option></select>
            <textarea rows={2} placeholder="Notes (optional)" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/>
            <button onClick={savePay} style={{background:C.gold,color:"#000",fontWeight:700,padding:13,fontSize:15}}>{editPay?"Update Payment":"Record Payment"}</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── Dashboard (Admin) ─────────────────────────────────────────
function Dashboard({members,payments,groups}) {
  const tm=curM();
  const totalChit=members.reduce((s,m)=>s+Number(m.chitAmount||0),0);
  const paidNow=payments.filter(p=>p.month===tm&&p.status==="Paid").length;
  const totalCol=payments.filter(p=>p.status==="Paid").reduce((s,p)=>s+Number(p.amount||0),0);
  const pct=members.length>0?Math.round(paidNow/members.length*100):0;

  return (
    <div style={{animation:"fadeIn .3s ease"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        {[
          {i:"👥",l:"Members",v:members.length,c:C.blue},
          {i:"🗂️",l:"Groups",v:groups.length,c:C.purple},
          {i:"💰",l:"Total Chit",v:fmt(totalChit),c:C.gold},
          {i:"🏦",l:"Collected",v:fmt(totalCol),c:C.green},
          {i:"✅",l:"Paid",v:paidNow,c:C.green},
          {i:"⏳",l:"Pending",v:members.length-paidNow,c:"#fb923c"},
        ].map(x=>(
          <div key={x.l} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14}}>
            <div style={{fontSize:20,marginBottom:5}}>{x.i}</div>
            <div className="mono" style={{fontSize:20,fontWeight:700,color:x.c}}>{x.v}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:3}}>{x.l}</div>
          </div>
        ))}
      </div>

      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14,marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <span style={{fontWeight:600,fontSize:13}}>{tm} Collection</span>
          <span className="mono" style={{color:C.gold,fontWeight:700}}>{pct}%</span>
        </div>
        <div style={{background:"#1e293b",borderRadius:99,height:10}}>
          <div style={{background:`linear-gradient(90deg,${C.gold},#f97316)`,borderRadius:99,height:10,width:`${pct}%`,transition:"width .5s"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.muted,marginTop:5}}>
          <span>{paidNow} paid</span><span>{members.length-paidNow} pending</span>
        </div>
      </div>

      {groups.length>0&&(
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14,marginBottom:14}}>
          <b style={{fontSize:14,display:"block",marginBottom:12}}>📊 Group Summary</b>
          {groups.map(g=>{
            const gM=members.filter(m=>m.groupId===g.id);
            const gP=payments.filter(p=>p.month===tm&&p.status==="Paid"&&gM.some(m=>m.id===p.memberId)).length;
            const gPct=gM.length>0?Math.round(gP/gM.length*100):0;
            return(
              <div key={g.id} style={{marginBottom:12,paddingBottom:12,borderBottom:`1px solid ${C.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontWeight:600,fontSize:13}}>{g.name}</span>
                  <span style={{fontSize:12,color:C.muted}}>{gM.length} members · {gPct}%</span>
                </div>
                <div style={{background:"#1e293b",borderRadius:99,height:6}}>
                  <div style={{background:C.gold,borderRadius:99,height:6,width:`${gPct}%`,transition:"width .5s"}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.muted,marginTop:4}}>
                  <span>{gP} paid</span><span>{gM.length-gP} pending</span>
                </div>
              </div>
            );
          })}
        </div>
      )}

      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14}}>
        <b style={{fontSize:14,display:"block",marginBottom:10}}>Recent Payments</b>
        {payments.slice(0,5).length===0
          ?<div style={{color:C.muted,textAlign:"center",padding:20,fontSize:13}}>No payments yet</div>
          :payments.slice(0,5).map(p=>(
            <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${C.border}`}}>
              <div>
                <div style={{fontWeight:600,fontSize:14}}>{p.memberName}</div>
                <div style={{fontSize:11,color:C.muted}}>{p.month} · {p.date}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div className="mono" style={{color:C.green,fontWeight:700}}>{fmt(p.amount)}</div>
                <Badge s={p.status}/>
              </div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────
function App() {
  const [ready,setReady]=useState(!!window.__fb);
  const [user,setUser]=useState(null);
  const [memberGroup,setMemberGroup]=useState(null); // group login
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("dashboard");
  const [groups,setGroups]=useState([]);
  const [members,setMembers]=useState([]);
  const [payments,setPayments]=useState([]);
  const [toast,setToast]=useState(null);

  useEffect(()=>{
    const init=()=>{
      setReady(true);
      const fb=window.__fb;
      // Load groups first (needed for member login)
      fb.getDocs(fb.query(fb.collection(fb.db,"groups"),fb.orderBy("name"))).then(gs=>{
        setGroups(gs.docs.map(d=>({id:d.id,...d.data()})));
      });
      fb.onAuthStateChanged(fb.auth,async u=>{
        setUser(u);
        if(u){
          try{
            const [ms,ps]=await Promise.all([
              fb.getDocs(fb.query(fb.collection(fb.db,"members"),fb.orderBy("name"))),
              fb.getDocs(fb.query(fb.collection(fb.db,"payments"),fb.orderBy("date","desc")))
            ]);
            setMembers(ms.docs.map(d=>({id:d.id,...d.data()})));
            setPayments(ps.docs.map(d=>({id:d.id,...d.data()})));
          }catch(e){console.error(e);}
        }
        setLoading(false);
      });
    };
    if(window.__fb) init();
    else window.addEventListener('fbready',init,{once:true});
  },[]);

  const showToast=(msg,type="ok")=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),2500);
  };

  const handleMemberLogin=async(group)=>{
    // Load data for member view
    const fb=window.__fb;
    try{
      const [ms,ps]=await Promise.all([
        fb.getDocs(fb.query(fb.collection(fb.db,"members"),fb.orderBy("name"))),
        fb.getDocs(fb.query(fb.collection(fb.db,"payments"),fb.orderBy("date","desc")))
      ]);
      setMembers(ms.docs.map(d=>({id:d.id,...d.data()})));
      setPayments(ps.docs.map(d=>({id:d.id,...d.data()})));
      setMemberGroup(group);
    }catch{setMemberGroup(group);}
  };

  if(!ready||loading) return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{width:40,height:40,border:`4px solid ${C.border}`,borderTop:`4px solid ${C.gold}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
      <div style={{color:C.muted,fontSize:14}}>Loading...</div>
    </div>
  );

  // Member view
  if(memberGroup) return (
    <MemberView
      group={memberGroup}
      members={members}
      payments={payments}
      onLogout={()=>setMemberGroup(null)}
    />
  );

  // Not logged in
  if(!user) return <Login groups={groups} onMemberLogin={handleMemberLogin}/>;

  // Admin view
  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      {toast&&(
        <div style={{position:"fixed",top:12,right:12,zIndex:999,background:toast.type==="ok"?"#14532d":"#7f1d1d",color:"#fff",padding:"10px 16px",borderRadius:10,fontSize:13,fontWeight:600,boxShadow:"0 4px 20px rgba(0,0,0,.5)"}}>
          {toast.type==="ok"?"✅ ":"❌ "}{toast.msg}
        </div>
      )}
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"0 14px",display:"flex",alignItems:"center",justifyContent:"space-between",height:52}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:30,height:30,background:C.gold,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>🏛️</div>
          <div>
            <div style={{fontWeight:700,fontSize:13,color:C.gold}}>KMBSC Admin</div>
            <div style={{fontSize:10,color:C.muted}}>Kovil Mutual Benefit Savings Chit</div>
          </div>
        </div>
        <button onClick={()=>window.__fb.signOut(window.__fb.auth)} style={{background:"#1e293b",color:C.red,fontSize:12,padding:"6px 12px"}}>Logout</button>
      </div>
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,display:"flex",overflowX:"auto"}}>
        {[["dashboard","📊","Dashboard"],["groups","🗂️","Groups"],["members","👥","Members"],["payments","💳","Payments"]].map(([id,icon,lbl])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:"12px 14px",background:"none",color:tab===id?C.gold:C.muted,fontWeight:tab===id?700:400,borderBottom:tab===id?`2px solid ${C.gold}`:"2px solid transparent",borderRadius:0,fontSize:12,whiteSpace:"nowrap",flexShrink:0}}>
            {icon} {lbl}
          </button>
        ))}
      </div>
      <div style={{padding:"14px",maxWidth:700,margin:"0 auto"}}>
        {tab==="dashboard"&&<Dashboard members={members} payments={payments} groups={groups}/>}
        {tab==="groups"&&<Groups groups={groups} setGroups={setGroups} showToast={showToast}/>}
        {tab==="members"&&<Members members={members} setMembers={setMembers} payments={payments} groups={groups} showToast={showToast}/>}
        {tab==="payments"&&<Payments members={members} payments={payments} setPayments={setPayments} groups={groups} showToast={showToast}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
