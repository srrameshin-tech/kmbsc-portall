<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>KMBSC Savings Chit</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f1117;color:#e2e8f0;font-family:'Sora',sans-serif;overflow-x:hidden;}
input,select,textarea{background:#12151f;border:1.5px solid #2a2d3e;color:#e2e8f0;border-radius:10px;padding:13px 14px;font-size:16px;width:100%;outline:none;font-family:'Sora',sans-serif;-webkit-appearance:none;}
input:focus,select:focus{border-color:#f5c842;}
button{cursor:pointer;font-family:'Sora',sans-serif;border:none;border-radius:10px;}
button:active{opacity:.75;}
.mono{font-family:'Courier New',monospace;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:#2a2d3e;border-radius:3px;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

.scroll-tabs{display:flex;overflow-x:auto;gap:8px;padding-bottom:6px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.scroll-tabs::-webkit-scrollbar{display:none;}
.stab{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;white-space:nowrap;border:1.5px solid #2a2d3e;background:#1a1d27;color:#64748b;cursor:pointer;}
.stab.active{background:#f5c842;color:#000;border-color:#f5c842;}
.stab.blue{background:#60a5fa;color:#fff;border-color:#60a5fa;}
.stab.purple{background:#a78bfa;color:#fff;border-color:#a78bfa;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;overflow-y:auto;padding:12px;display:flex;align-items:flex-start;justify-content:center;}
.modal{background:#1a1d27;border:1.5px solid #2a2d3e;border-radius:16px;padding:20px;width:100%;max-width:440px;margin:10px auto;animation:fadeIn .2s ease;}

/* Custom dropdown styles */
.custom-select-wrap{position:relative;width:100%;}
.custom-select-box{background:#12151f;border:1.5px solid #2a2d3e;color:#e2e8f0;border-radius:10px;padding:13px 14px;font-size:16px;width:100%;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:'Sora',sans-serif;}
.custom-select-box.open{border-color:#f5c842;}
.custom-select-box .arrow{color:#64748b;font-size:12px;transition:transform .2s;}
.custom-select-box.open .arrow{transform:rotate(180deg);}
.custom-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#1a1d27;border:1.5px solid #2a2d3e;border-radius:12px;z-index:500;max-height:280px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.custom-dropdown .group-label{padding:8px 14px 4px;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;}
.custom-dropdown .opt{padding:12px 16px;font-size:15px;cursor:pointer;border-bottom:1px solid #12151f;display:flex;align-items:center;gap:8px;}
.custom-dropdown .opt:hover{background:#22263a;}
.custom-dropdown .opt.selected{color:#f5c842;font-weight:700;}
.custom-dropdown .opt:last-child{border-bottom:none;}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBVGVu59jDZybPFAX_pRisSrQRoXHQ0EWY",
  authDomain:"kmbsc-chit.firebaseapp.com",
  databaseURL:"https://kmbsc-chit-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"kmbsc-chit",
  storageBucket:"kmbsc-chit.firebasestorage.app",
  messagingSenderId:"511325458985",
  appId:"1:511325458985:web:a7597bcf0f89b71405c238"
});

const db = firebase.database();
const auth = firebase.auth();

const C = {bg:"#0f1117",card:"#1a1d27",border:"#2a2d3e",gold:"#f5c842",green:"#22c55e",red:"#ef4444",blue:"#60a5fa",muted:"#64748b",purple:"#a78bfa"};
const MO = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const curM = () => {const d=new Date();return `${MO[d.getMonth()]} ${d.getFullYear()}`;};
const fmt = n => "₹"+Number(n||0).toLocaleString("en-IN");
const today = () => new Date().toISOString().slice(0,10);

let state = {
  user: null,
  memberGroup: null,
  loading: true,
  tab: "dashboard",
  groups: [],
  members: [],
  payments: [],
  toast: null,
  modal: null,
};

// ── KMBSC Logo SVG ──
function kmbscLogo(size=32, textColor="#f5c842") {
  return `<svg width="${size}" height="${size}" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="40" height="40" rx="10" fill="${textColor}"/>
    <!-- Temple base -->
    <rect x="6" y="28" width="28" height="5" rx="1" fill="#0f1117"/>
    <!-- Temple pillars -->
    <rect x="9" y="20" width="4" height="9" fill="#0f1117"/>
    <rect x="17" y="20" width="4" height="9" fill="#0f1117"/>
    <rect x="25" y="20" width="4" height="9" fill="#0f1117"/>
    <!-- Temple roof -->
    <polygon points="20,7 34,20 6,20" fill="#0f1117"/>
    <!-- Roof top -->
    <rect x="16" y="5" width="8" height="4" rx="1" fill="#0f1117"/>
    <!-- Flag on top -->
    <rect x="19" y="2" width="1.5" height="4" fill="#0f1117"/>
    <polygon points="20.5,2 24,3.5 20.5,5" fill="#0f1117"/>
  </svg>`;
}

function render() {
  const root = document.getElementById("root");
  if (state.loading) {
    root.innerHTML = `
      <div style="min-height:100vh;background:${C.bg};display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
        <div style="width:44px;height:44px;border:4px solid ${C.border};border-top:4px solid ${C.gold};border-radius:50%;animation:spin 1s linear infinite;"></div>
        <div style="color:${C.muted};font-size:14px;">Loading KMBSC...</div>
      </div>`;
    return;
  }
  if (!state.user && !state.memberGroup) { renderLogin(); return; }
  if (state.memberGroup) { renderMemberView(); return; }
  renderAdmin();
}

function showToast(msg, type="ok") {
  state.toast = {msg, type};
  render();
  setTimeout(() => { state.toast = null; render(); }, 2500);
}

// ── Login ──
function renderLogin() {
  const root = document.getElementById("root");
  root.innerHTML = `
    <div style="min-height:100vh;background:${C.bg};padding:40px 16px 20px;">
      <div style="max-width:380px;margin:0 auto;">
        <div style="text-align:center;margin-bottom:24px;">
          <div style="display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px;">
            ${kmbscLogo(64)}
          </div>
          <div style="font-weight:700;font-size:26px;color:${C.gold};">KMBSC</div>
          <div style="font-size:12px;color:${C.muted};margin-top:3px;">Kovil Mutual Benefit Savings Chit</div>
          <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(34,197,94,.15);border:1.5px solid #22c55e;border-radius:20px;padding:4px 14px;margin-top:10px;font-size:12px;font-weight:700;color:#22c55e;">
            <span style="width:8px;height:8px;background:#22c55e;border-radius:50%;display:inline-block;animation:blink 1.5s infinite;"></span>
            Live
          </div>
        </div>

        <div style="display:flex;background:${C.card};border:1.5px solid ${C.border};border-radius:12px;padding:4px;margin-bottom:20px;">
          <button onclick="setLoginMode('admin')" id="btnAdmin" style="flex:1;padding:11px;background:${C.gold};color:#000;font-weight:700;font-size:14px;border-radius:8px;">🔐 Admin / நிர்வாகி</button>
          <button onclick="setLoginMode('member')" id="btnMember" style="flex:1;padding:11px;background:none;color:${C.muted};font-weight:400;font-size:14px;border-radius:8px;">👥 Member / உறுப்பினர்</button>
        </div>

        <div style="background:${C.card};border:1.5px solid ${C.border};border-radius:16px;padding:20px;">
          <div id="loginForm">
            <div style="display:flex;flex-direction:column;gap:12px;">
              <input id="loginEmail" type="email" placeholder="Admin Email" autocomplete="email"/>
              <input id="loginPass" type="password" placeholder="Admin Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAdminLogin()"/>
              <div id="loginErr" style="display:none;color:${C.red};font-size:13px;background:#2d1515;padding:10px;border-radius:8px;text-align:center;"></div>
              <button onclick="doAdminLogin()" style="background:${C.gold};color:#000;font-weight:700;padding:15px;font-size:16px;">🔐 Admin Login</button>
            </div>
          </div>
          <div id="memberForm" style="display:none;">
            <div style="display:flex;flex-direction:column;gap:12px;">
              <select id="memberGroupSel" style="-webkit-appearance:auto;">
                <option value="">உங்கள் Group தேர்வு செய்யுங்கள்</option>
                ${state.groups.map(g=>`<option value="${g.id}">${g.name}</option>`).join('')}
              </select>
              <input id="memberPass" type="password" placeholder="Group Password" onkeydown="if(event.key==='Enter')doMemberLogin()"/>
              <div id="memberErr" style="display:none;color:${C.red};font-size:13px;background:#2d1515;padding:10px;border-radius:8px;text-align:center;"></div>
              <button onclick="doMemberLogin()" style="background:${C.blue};color:#fff;font-weight:700;padding:15px;font-size:16px;">👥 Member Login</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    ${renderToastHTML()}`;
}

let loginMode = "admin";
function setLoginMode(mode) {
  loginMode = mode;
  document.getElementById("loginForm").style.display = mode==="admin"?"block":"none";
  document.getElementById("memberForm").style.display = mode==="member"?"block":"none";
  document.getElementById("btnAdmin").style.background = mode==="admin"?C.gold:"none";
  document.getElementById("btnAdmin").style.color = mode==="admin"?"#000":C.muted;
  document.getElementById("btnMember").style.background = mode==="member"?C.blue:"none";
  document.getElementById("btnMember").style.color = mode==="member"?"#fff":C.muted;
}

async function doAdminLogin() {
  const e = document.getElementById("loginEmail").value.trim();
  const p = document.getElementById("loginPass").value;
  const errEl = document.getElementById("loginErr");
  if(!e||!p){errEl.textContent="Email & Password தேவை!";errEl.style.display="block";return;}
  errEl.style.display="none";
  try { await auth.signInWithEmailAndPassword(e, p); }
  catch { errEl.textContent="தவறான Email / Password";errEl.style.display="block"; }
}

function doMemberLogin() {
  const selId = document.getElementById("memberGroupSel").value;
  const pass = document.getElementById("memberPass").value;
  const errEl = document.getElementById("memberErr");
  if(!selId){errEl.textContent="Group select பண்ணுங்கள்!";errEl.style.display="block";return;}
  const group = state.groups.find(g=>g.id===selId);
  if(!group){errEl.textContent="Group not found!";errEl.style.display="block";return;}
  if(!pass){errEl.textContent="Password தேவை!";errEl.style.display="block";return;}
  if(pass !== group.password){errEl.textContent="தவறான Password!";errEl.style.display="block";return;}
  state.memberGroup = group;
  render();
}

// ── Member View ──
function renderMemberView() {
  const g = state.memberGroup;
  const gMembers = state.members.filter(m=>m.groupId===g.id);
  const tm = curM();

  const generateMonths = (startMonth) => {
    if(!startMonth) return [tm];
    const months=[];
    const [sy,sm]=startMonth.split("-").map(Number);
    const now=new Date();
    let y=sy,mo=sm;
    while(y<now.getFullYear()||(y===now.getFullYear()&&mo<=now.getMonth()+1)){
      months.push(`${MO[mo-1]} ${y}`);
      mo++;if(mo>12){mo=1;y++;}
      if(months.length>60)break;
    }
    return months;
  };

  const allMonths = generateMonths(g.startMonth);
  const filterMonth = window._memberMonth || tm;
  if(!window._memberMonth) window._memberMonth = tm;

  const mPayments = state.payments.filter(p=>p.month===filterMonth&&gMembers.some(m=>m.id===p.memberId));
  const paidIds = mPayments.filter(p=>p.status==="Paid").map(p=>p.memberId);
  const paidCount = gMembers.filter(m=>paidIds.includes(m.id)).length;
  const pct = gMembers.length>0?Math.round(paidCount/gMembers.length*100):0;
  const pending = gMembers.filter(m=>!paidIds.includes(m.id));

  document.getElementById("root").innerHTML = `
    ${renderToastHTML()}
    <div style="min-height:100vh;background:${C.bg};">
      <div style="background:${C.card};border-bottom:1.5px solid ${C.border};padding:0 14px;display:flex;align-items:center;justify-content:space-between;height:54px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;">${kmbscLogo(32, C.blue)}</div>
          <div>
            <div style="font-weight:700;font-size:14px;color:${C.blue};">${g.name}</div>
            <div style="font-size:10px;color:${C.muted};">Member View · Read Only</div>
          </div>
        </div>
        <button onclick="window._memberMonth=null;state.memberGroup=null;render();" style="background:#1e293b;color:${C.red};font-size:13px;padding:7px 14px;">Logout</button>
      </div>
      <div style="padding:14px;max-width:700px;margin:0 auto;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
          ${[["👥","Members",gMembers.length,C.blue],["💰","Chit/Mo",fmt(g.chitAmount),C.gold],["✅","Paid",paidCount,C.green],["⏳","Pending",gMembers.length-paidCount,"#fb923c"]].map(([ic,l,v,c])=>`
          <div style="background:${C.card};border:1.5px solid ${C.border};border-radius:14px;padding:14px;">
            <div style="font-size:22px;margin-bottom:5px;">${ic}</div>
            <div class="mono" style="font-size:22px;font-weight:700;color:${c};">${v}</div>
            <div style="font-size:11px;color:${C.muted};margin-top:3px;">${l}</div>
          </div>`).join('')}
        </div>

        <div style="background:${C.card};border:1.5px solid ${C.border};border-radius:14px;padding:14px;margin-bottom:14px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
            <span style="font-weight:600;font-size:14px;">${filterMonth} Collection</span>
            <span class="mono" style="color:${C.gold};font-weight:700;">${pct}%</span>
          </div>
          <div style="background:#1e293b;border-radius:99px;height:10px;">
            <div style="background:linear-gradient(90deg,${C.gold},#f97316);border-radius:99px;height:10px;width:${pct}%;transition:width .5s;"></div>
          </div>
        </div>

        <div class="scroll-tabs" style="margin-bottom:14px;">
          ${allMonths.map(m=>`<button class="stab ${m===filterMonth?"active":""}" onclick="window._memberMonth='${m}';render();">${m}</button>`).join('')}
        </div>

        ${pending.length>0?`
        <div style="background:#1c1208;border:1.5px solid #92400e;border-radius:12px;padding:12px;margin-bottom:12px;">
          <div style="font-weight:700;color:#fb923c;font-size:14px;margin-bottom:8px;">⏳ Pending (${pending.length})</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${pending.map(m=>`<span style="background:#292117;color:#fbbf24;padding:4px 12px;border-radius:20px;font-size:13px;">${m.name}</span>`).join('')}
          </div>
        </div>`:''}

        <div style="background:${C.card};border:1.5px solid ${C.border};border-radius:14px;overflow:hidden;">
          <div style="padding:12px 14px;border-bottom:1.5px solid ${C.border};font-weight:700;font-size:15px;">Members — ${filterMonth}</div>
          ${gMembers.length===0?`<div style="text-align:center;padding:30px;color:${C.muted};">No members</div>`:
          gMembers.map(m=>{
            const paid=paidIds.includes(m.id);
            const pay=mPayments.find(p=>p.memberId===m.id);
            return`<div style="display:flex;justify-content:space-between;align-items:center;padding:13px 14px;border-bottom:1.5px solid ${C.border};">
              <div>
                <div style="font-weight:700;font-size:15px;">${m.name}</div>
                <div style="font-size:12px;color:${C.muted};">${m.phone||''}</div>
              </div>
              <div style="text-align:right;">
                ${pay?`<div class="mono" style="color:${C.green};font-size:14px;font-weight:700;">${fmt(pay.amount)}</div>`:''}
                <span style="background:${paid?"#14532d":"#7c2d12"};color:${paid?"#4ade80":"#fb923c"};border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;">${paid?"Paid":"Pending"}</span>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
}

// ── Admin View ──
function renderAdmin() {
  const tabs = [["dashboard","📊","Dashboard"],["groups","🗂️","Groups"],["members","👥","Members"],["payments","💳","Payments"]];
  document.getElementById("root").innerHTML = `
    ${renderToastHTML()}
    ${renderModal()}
    <div style="min-height:100vh;background:${C.bg};">
      <div style="background:${C.card};border-bottom:1.5px solid ${C.border};padding:0 14px;display:flex;align-items:center;justify-content:space-between;height:54px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;">${kmbscLogo(36)}</div>
          <div>
            <div style="font-weight:700;font-size:14px;color:${C.gold};">KMBSC Admin</div>
            <div style="font-size:10px;color:${C.muted};">Kovil Mutual Benefit Savings Chit</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="display:inline-flex;align-items:center;gap:4px;background:rgba(34,197,94,.15);border:1.5px solid #22c55e;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;color:#22c55e;">
            <span style="width:7px;height:7px;background:#22c55e;border-radius:50%;animation:blink 1.5s infinite;"></span>Live
          </div>
          <button onclick="auth.signOut()" style="background:#1e293b;color:${C.red};font-size:13px;padding:7px 14px;">Logout</button>
        </div>
      </div>
      <div style="background:${C.card};border-bottom:1.5px solid ${C.border};display:flex;overflow-x:auto;scrollbar-width:none;">
        ${tabs.map(([id,icon,lbl])=>`
        <button onclick="state.tab='${id}';render();" style="padding:14px 16px;background:none;color:${state.tab===id?C.gold:C.muted};font-weight:${state.tab===id?700:400};border-bottom:${state.tab===id?`2.5px solid ${C.gold}`:"2.5px solid transparent"};border-radius:0;font-size:13px;white-space:nowrap;flex-shrink:0;">
          ${icon} ${lbl}
        </button>`).join('')}
      </div>
      <div style="padding:14px;max-width:700px;margin:0 auto;">
        ${state.tab==="dashboard"?renderDashboard():""}
        ${state.tab==="groups"?renderGroups():""}
        ${state.tab==="members"?renderMembers():""}
        ${state.tab==="payments"?renderPayments():""}
      </div>
    </div>`;
}

// ── Dashboard ──
function renderDashboard() {
  const tm=curM();
  const totalCol=state.payments.filter(p=>p.status==="Paid").reduce((s,p)=>s+Number(p.amount||0),0);
  const paidNow=state.payments.filter(p=>p.month===tm&&p.status==="Paid").length;
  const pct=state.members.length>0?Math.round(paidNow/state.members.length*100):0;
  return `
  <div style="animation:fadeIn .3s ease;">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
      ${[["👥","Members",state.members.length,C.blue],["🗂️","Groups",state.groups.length,C.purple],["🏦","Collected",fmt(totalCol),C.green],["✅","Paid Now",paidNow,C.green],["⏳","Pending",state.members.length-paidNow,"#fb923c"],["📅","Month",tm,C.gold]].map(([ic,l,v,c])=>`
      <div style="background:${C.card};border:1.5px solid ${C.border};border-radius:14px;padding:14px;">
        <div style="font-size:20px;margin-bottom:5px;">${ic}</div>
        <div class="mono" style="font-size:18px;font-weight:700;color:${c};">${v}</div>
        <div style="font-size:11px;color:${C.muted};margin-top:3px;">${l}</div>
      </div>`).join('')}
    </div>
    <div style="background:${C.card};border:1.5px solid ${C.border};border-radius:14px;padding:14px;margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <span style="font-weight:700;font-size:14px;">${tm} Collection</span>
        <span class="mono" style="color:${C.gold};font-weight:700;">${pct}%</span>
      </div>
      <div style="background:#1e293b;border-radius:99px;height:12px;">
        <div style="background:linear-gradient(90deg,${C.gold},#f97316);border-radius:99px;height:12px;width:${pct}%;transition:width .5s;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:${C.muted};margin-top:6px;">
        <span>${paidNow} paid</span><span>${state.members.length-paidNow} pending</span>
      </div>
    </div>
    ${state.groups.length>0?`
    <div style="background:${C.card};border:1.5px solid ${C.border};border-radius:14px;padding:14px;margin-bottom:14px;">
      <b style="font-size:15px;display:block;margin-bottom:12px;">📊 Group Summary</b>
      ${state.groups.map(g=>{
        const gM=state.members.filter(m=>m.groupId===g.id);

window._payFilter = "all";
window._payMonth = curM();
function renderPayments() {
  const filteredMembers = window._payFilter==="all" ? state.members : state.members.filter(m=>m.groupId===window._payFilter);
  const selGroup = window._payFilter==="all" ? null : state.groups.find(g=>g.id===window._payFilter);

  const generateMonths = (startMonth) => {
    if(!startMonth) return [curM()];
    const months=[];const [sy,sm]=startMonth.split("-").map(Number);
    const now=new Date();let y=sy,mo=sm;
    while(y<now.getFullYear()||(y===now.getFullYear()&&mo<=now.getMonth()+1)){
      months.push(`${MO[mo-1]} ${y}`);mo++;if(mo>12){mo=1;y++;}if(months.length>60)break;
    }
    return months;
  };

  const allMonths = window._payFilter==="all"
    ? [...new Set([curM(),...state.payments.map(p=>p.month)])].filter(Boolean)
    : generateMonths(selGroup?.startMonth);

  const filtPay = state.payments.filter(p=>{
    const mMatch = p.month===window._payMonth;
    const gMatch = window._payFilter==="all" || filteredMembers.some(m=>m.id===p.memberId);
    return mMatch && gMatch;
  });
  const paidIds = filtPay.filter(p=>p.status==="Paid").map(p=>p.memberId);
  const pending = filteredMembers.filter(m=>!paidIds.includes(m.id));

  return `
  <div style="animation:fadeIn .3s ease;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <b style="font-size:18px;">Payments</b>

      ${state.groups.map(g=>`<button class="stab ${window._payFilter===g.id?'purple':''}" style="${window._payFilter===g.id?`background:${C.purple};color:#fff;border-color:${C.purple}`:''}" onclick="window._payFilter='${g.id}';render();">${g.name}</button>`).join('')}
    </div>
    <div class="scroll-tabs" style="margin-bottom:14px;">
      ${allMonths.map(m=>`<button class="stab ${m===window._payMonth?'blue':''}" style="${m===window._payMonth?`background:${C.blue};color:#fff;border-color:${C.blue}`:''}" onclick="window._payMonth='${m}';render();">${m}</button>`).join('')}
    </div>
    ${pending.length>0?`
    <div style="background:#1c1208;border:1.5px solid #92400e;border-radius:12px;padding:12px;margin-bottom:12px;">
      <div style="font-weight:700;color:#fb923c;font-size:14px;margin-bottom:8px;">⏳ Pending (${pending.length})</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        ${pending.map(m=>`<span style="background:#292117;color:#fbbf24;padding:4px 12px;border-radius:20px;font-size:13px;">${m.name||'Unknown'}</span>`).join('')}
      </div>
    </div>`:''}
    <div style="background:${C.card};border:1.5px solid ${C.border};border-radius:14px;overflow:hidden;">
      ${filtPay.length===0?`<div style="text-align:center;padding:40px;color:${C.muted};">No payments for ${window._payMonth}</div>`:
      filtPay.map(p=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:13px 14px;border-bottom:1.5px solid ${C.border};">
        <div style="flex:1;">
          <div style="font-weight:700;font-size:15px;">${p.memberName||'-'}</div>

          <span class="mono" style="color:${C.green};font-weight:700;font-size:14px;">${fmt(p.amount)}</span>

// ── Custom Member Dropdown ──
// FIX: Replace native <select> with custom dropdown to fix "undefined" bug on mobile
let _selMemberId = "";
let _selMemberName = "";
let _dropOpen = false;

function buildMemberDropdown(selectedId) {
  _selMemberId = selectedId || "";
  const selMember = state.members.find(m=>m.id===_selMemberId);
  _selMemberName = selMember ? selMember.name : "";

  // Build groups + ungrouped members list
  const rows = [];

  state.groups.forEach(g => {
    const gMs = state.members.filter(m => m.groupId === g.id);
    if(gMs.length === 0) return;
    rows.push({type:'group', label: g.name});
    gMs.forEach(m => rows.push({type:'opt', id: m.id, name: m.name, groupId: g.id}));
  });

  const unGrouped = state.members.filter(m => !m.groupId || !state.groups.find(g=>g.id===m.groupId));
  if(unGrouped.length > 0) {
    rows.push({type:'group', label:'No Group'});
    unGrouped.forEach(m => rows.push({type:'opt', id: m.id, name: m.name}));
  }

  return rows;
}

function renderMemberDropdownHTML(selectedId, dropId="payMemberDrop") {
  const rows = buildMemberDropdown(selectedId);
  const selMember = state.members.find(m=>m.id===selectedId);
  const displayText = selMember ? selMember.name : "Select Member *";
  const isPlaceholder = !selMember;

  return `
  <div class="custom-select-wrap" id="${dropId}_wrap">
    <div class="custom-select-box ${_dropOpen?'open':''}" id="${dropId}_box" onclick="toggleMemberDrop('${dropId}')">
      <span style="color:${isPlaceholder?C.muted:'#e2e8f0'};">${displayText}</span>
      <span class="arrow">▼</span>
    </div>
    <div class="custom-dropdown" id="${dropId}_list" style="display:${_dropOpen?'block':'none'};">
      ${rows.map(r => {
        if(r.type==='group') return `<div class="group-label">${r.label}</div>`;
        const isSel = r.id === selectedId;
        return `<div class="opt ${isSel?'selected':''}" onclick="pickMember('${r.id}','${r.name.replace(/'/g,"\\'")}','${dropId}')">
          ${isSel?'✓ ':''}<span>${r.name}</span>
        </div>`;
      }).join('')}
      ${rows.filter(r=>r.type==='opt').length===0?`<div class="opt" style="color:${C.muted};cursor:default;">No members found</div>`:''}
    </div>
  </div>
  <input type="hidden" id="${dropId}_val" value="${selectedId||''}"/>`;
}

function toggleMemberDrop(dropId) {
  _dropOpen = !_dropOpen;
  const list = document.getElementById(dropId+"_list");
  const box = document.getElementById(dropId+"_box");
  if(list) list.style.display = _dropOpen ? 'block' : 'none';
  if(box) box.classList.toggle('open', _dropOpen);
}

function pickMember(id, name, dropId) {
  _selMemberId = id;
  _selMemberName = name;
  _dropOpen = false;

  // Update hidden input
  const hiddenInput = document.getElementById(dropId+"_val");
  if(hiddenInput) hiddenInput.value = id;

  // Update display box
  const box = document.getElementById(dropId+"_box");
  if(box) {
    box.classList.remove('open');
    box.innerHTML = `<span style="color:#e2e8f0;">${name}</span><span class="arrow">▼</span>`;
  }

  // Hide dropdown
  const list = document.getElementById(dropId+"_list");
  if(list) list.style.display = 'none';

  // Auto-fill amount
  const m = state.members.find(x=>x.id===id);
  const amtEl = document.getElementById("mPAmt");
  if(m && amtEl && !amtEl.value) amtEl.value = m.chitAmount||"";
}

// Close dropdown on outside click
document.addEventListener('click', function(e) {
  if(!e.target.closest('.custom-select-wrap')) {
    _dropOpen = false;
    document.querySelectorAll('.custom-dropdown').forEach(d=>d.style.display='none');
    document.querySelectorAll('.custom-select-box').forEach(b=>b.classList.remove('open'));
  }
});

async function saveGroup(id) {
  const name = document.getElementById("mGName").value.trim();
  const password = document.getElementById("mGPass").value.trim();
  if(!name) return alert("Group name தேவை!");
  if(!password) return alert("Password தேவை!");
  const data = {
    name,
    chitAmount: document.getElementById("mGAmt").value||"0",
    password,
    startMonth: document.getElementById("mGStart").value||"",
    description: document.getElementById("mGDesc").value||""
  };
  try {
    if(id) {
      await db.ref(`kmbsc/groups/${id}`).update(data);
      state.groups = state.groups.map(g=>g.id===id?{...g,...data}:g);
      showToast("Group updated!");
    } else {
      const ref = db.ref("kmbsc/groups").push();
      await ref.set({...data, createdAt: today()});
      state.groups.push({id:ref.key,...data});
      showToast("Group added!");
    }
    modalData=null; render();
  } catch(e) { showToast("Error: "+e.message,"err"); }
}

async function deleteGroup(id) {
  if(!confirm("Delete this group?")) return;
  try {
    await db.ref(`kmbsc/groups/${id}`).remove();
    state.groups = state.groups.filter(g=>g.id!==id);
    showToast("Group deleted","err"); render();
  } catch(e) { showToast("Error","err"); }
}

  const data = {
    name, phone,
    chitAmount: document.getElementById("mMAmt").value||"0",
    groupId: document.getElementById("mMGroup").value||"",
    joinDate: document.getElementById("mMJoin").value||"",
    status: document.getElementById("mMStatus").value||"Active",
    notes: document.getElementById("mMNotes").value||""
  };
  try {
    if(id) {
      await db.ref(`kmbsc/members/${id}`).update(data);
      state.members = state.members.map(m=>m.id===id?{...m,...data}:m);
      showToast("Member updated!");
    } else {
      const ref = db.ref("kmbsc/members").push();
      await ref.set(data);
      state.members.push({id:ref.key,...data});
      showToast("Member added!");
    }
    modalData=null; render();
  } catch(e) { showToast("Error","err"); }
}

async function deleteMember(id) {
  if(!confirm("Delete member?")) return;
  try {
    await db.ref(`kmbsc/members/${id}`).remove();
    state.members = state.members.filter(m=>m.id!==id);
    showToast("Deleted","err"); render();
  } catch(e) { showToast("Error","err"); }
}

// ── Payment Modal ── FIX: Custom dropdown replaces native select
function openPayModal(id=null) {
  const p = id ? state.payments.find(x=>x.id===id) : null;
  const tm = curM();
  _dropOpen = false;
  _selMemberId = p ? p.memberId : "";

  modalData = {
    title: p ? "Edit Payment" : "Record Payment",
    content: `
    <div style="display:flex;flex-direction:column;gap:12px;">
      ${renderMemberDropdownHTML(p?p.memberId:"", "payMemberDrop")}
      <input id="mPMonth" placeholder="Month (e.g. May 2026)" value="${p?p.month:tm}"/>
      <input id="mPAmt" type="number" placeholder="Amount ₹" value="${p?p.amount:''}"/>
      <input id="mPDate" type="date" value="${p?p.date||today():today()}"/>
      <select id="mPStatus" style="-webkit-appearance:auto;">
        <option ${!p||p.status==="Paid"?"selected":""}>Paid</option>
        <option ${p&&p.status==="Pending"?"selected":""}>Pending</option>
      </select>
      <textarea id="mPNotes" rows="2" placeholder="Notes (optional)">${p?p.notes||'':''}</textarea>
      <button onclick="savePayment('${id||''}')" style="background:${C.gold};color:#000;font-weight:700;padding:14px;font-size:15px;">${p?"Update Payment":"Record Payment"}</button>
    </div>`
  };
  render();
}

async function savePayment(id) {
  // FIX: Read from hidden input of custom dropdown
  const memberId = document.getElementById("payMemberDrop_val")?.value || _selMemberId;
  if(!memberId) return alert("Member select பண்ணுங்கள்!");
  const member = state.members.find(m=>m.id===memberId);
  const data = {
    memberId,
    memberName: member?.name||"-",
    month: document.getElementById("mPMonth").value||curM(),
    amount: document.getElementById("mPAmt").value||member?.chitAmount||0,
    date: document.getElementById("mPDate").value||today(),
    status: document.getElementById("mPStatus").value||"Paid",
    notes: document.getElementById("mPNotes").value||""
  };
  try {
    if(id) {
      await db.ref(`kmbsc/payments/${id}`).update(data);
      state.payments = state.payments.map(p=>p.id===id?{...p,...data}:p);
      showToast("Payment updated!");
    } else {
      const ref = db.ref("kmbsc/payments").push();
      await ref.set(data);
      state.payments.unshift({id:ref.key,...data});
      showToast("Payment recorded!");
    }
    modalData=null; render();
  } catch(e) { showToast("Error","err"); }
}

async function deletePayment(id) {
  if(!confirm("Delete payment?")) return;
  try {
    await db.ref(`kmbsc/payments/${id}`).remove();
    state.payments = state.payments.filter(p=>p.id!==id);
    showToast("Deleted","err"); render();
  } catch(e) { showToast("Error","err"); }
}

// ── Firebase Load ──
async function loadData() {
  try {
    const [gs, ms, ps] = await Promise.all([
      db.ref("kmbsc/groups").orderByChild("name").once("value"),
      db.ref("kmbsc/members").orderByChild("name").once("value"),
      db.ref("kmbsc/payments").once("value")
    ]);
    state.groups = gs.val() ? Object.entries(gs.val()).map(([id,v])=>({id,...v})) : [];
    state.members = ms.val() ? Object.entries(ms.val()).map(([id,v])=>({id,...v})) : [];
    const rawPay = ps.val() ? Object.entries(ps.val()).map(([id,v])=>({id,...v})) : [];
    state.payments = rawPay.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  } catch(e) { console.error(e); }
}

// ── Auth ──
auth.onAuthStateChanged(async user => {
  state.user = user;
  if(user) {
    state.loading = true; render();
    await loadData();
  }
  state.loading = false;
  render();
});

// Load groups for member login
db.ref("kmbsc/groups").orderByChild("name").once("value").then(snap => {
  state.groups = snap.val() ? Object.entries(snap.val()).map(([id,v])=>({id,...v})) : [];
  if(!state.user) render();
});

render();
</script>
</body>
